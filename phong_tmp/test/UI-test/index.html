<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMAP Production API Console</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-layer"></div>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand-block">
        <p class="eyebrow">SMAP Demo</p>
        <h1>Production-style UI Test</h1>
      </div>
      <div class="header-right">
        <nav class="top-nav" aria-label="Primary">
          <a href="#/campaigns" data-route-link="/campaigns">Campaigns</a>
          <a href="#/projects" data-route-link="/projects">Projects</a>
        </nav>
        <div class="auth-box">
          <button id="auth-action" class="secondary" type="button">Checking...</button>
          <div id="auth-note" class="auth-note">Verifying production session.</div>
        </div>
        <div id="auth-pill" class="status-pill">Checking session</div>
      </div>
    </header>

    <section class="runtime-strip">
      <div>
        <span class="label">Mode</span>
        <span id="runtime-mode"></span>
      </div>
      <div>
        <span class="label">Identity API</span>
        <span id="runtime-identity"></span>
      </div>
      <div>
        <span class="label">Project API</span>
        <span id="runtime-project"></span>
      </div>
      <div>
        <span class="label">Ingest API</span>
        <span id="runtime-ingest"></span>
      </div>
      <div>
        <span class="label">Session</span>
        <code id="runtime-session"></code>
      </div>
      <div>
        <span class="label">Swagger</span>
        <div id="runtime-swagger" class="runtime-links"></div>
      </div>
    </section>

    <main id="app" class="page-host" aria-live="polite"></main>
  </div>

  <div id="toast-stack" class="toast-stack" aria-live="assertive"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
