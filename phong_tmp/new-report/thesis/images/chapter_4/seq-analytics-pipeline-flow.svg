<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="940" viewBox="0 0 1680 940">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #475569; }
      .head { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #0f172a; }
      .body { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #1e293b; }
      .life { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; }
      .msg { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="48" y="58" class="title">Figure 4.6. Sequence Diagram of the Analytics Processing Flow</text>
  <text x="48" y="88" class="subtitle">From UAP publishing to analytics processing and downstream topic delivery for knowledge indexing.</text>

  <rect x="70" y="130" width="170" height="46" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="400" y="130" width="140" height="46" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <rect x="740" y="130" width="180" height="46" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="1100" y="130" width="180" height="46" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <rect x="1440" y="130" width="170" height="46" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="155" y="159" text-anchor="middle" class="head">ingest-srv</text>
  <text x="470" y="159" text-anchor="middle" class="head">Kafka</text>
  <text x="830" y="159" text-anchor="middle" class="head">analysis-srv</text>
  <text x="1190" y="159" text-anchor="middle" class="head">schema_analysis</text>
  <text x="1525" y="159" text-anchor="middle" class="head">knowledge-srv</text>

  <line x1="155" y1="176" x2="155" y2="860" class="life"/>
  <line x1="470" y1="176" x2="470" y2="860" class="life"/>
  <line x1="830" y1="176" x2="830" y2="860" class="life"/>
  <line x1="1190" y1="176" x2="1190" y2="860" class="life"/>
  <line x1="1525" y1="176" x2="1525" y2="860" class="life"/>

  <path d="M155 240 L470 240" class="msg"/>
  <rect x="220" y="212" width="185" height="22" rx="6" class="box"/>
  <text x="312" y="227" text-anchor="middle" class="body">publish `smap.collector.output`</text>

  <path d="M470 340 L830 340" class="msg"/>
  <rect x="585" y="312" width="130" height="22" rx="6" class="box"/>
  <text x="650" y="327" text-anchor="middle" class="body">consume UAP batch</text>

  <path d="M830 430 L830 430" class="msg"/>
  <rect x="865" y="402" width="250" height="22" rx="6" class="box"/>
  <text x="990" y="417" text-anchor="middle" class="body">run normalization, NLP, reporting, and signal logic</text>

  <path d="M830 540 L1190 540" class="msg"/>
  <rect x="915" y="512" width="190" height="22" rx="6" class="box"/>
  <text x="1010" y="527" text-anchor="middle" class="body">persist insights and manifests</text>

  <path d="M830 650 L470 650" class="msg"/>
  <rect x="560" y="622" width="180" height="22" rx="6" class="box"/>
  <text x="650" y="637" text-anchor="middle" class="body">publish analytics topics</text>

  <path d="M470 760 L1525 760" class="msg"/>
  <rect x="845" y="732" width="305" height="22" rx="6" class="box"/>
  <text x="997" y="747" text-anchor="middle" class="body">deliver batch, insights, and digest outputs downstream</text>
</svg>
