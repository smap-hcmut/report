<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 32px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #475569; }
      .name { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
      .body { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #334155; }
      .edge { stroke: #475569; stroke-width: 2.2; fill: none; }
      .diamond { fill: #475569; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="48" y="60" class="title">Figure 5.6. UML Class Diagram of Core Business Domain</text>
  <text x="48" y="92" class="subtitle">Conceptual business structure for campaign, project, datasource, crawl target, and crisis configuration.</text>

  <g transform="translate(120,220)">
    <rect x="0" y="0" width="260" height="190" fill="#ffffff" stroke="#0284c7" stroke-width="2.5"/>
    <line x1="0" y1="46" x2="260" y2="46" stroke="#64748b" stroke-width="2"/>
    <line x1="0" y1="118" x2="260" y2="118" stroke="#64748b" stroke-width="2"/>
    <text x="130" y="30" text-anchor="middle" class="name">Campaign</text>
    <text x="18" y="78" class="body">- id: UUID</text>
    <text x="18" y="102" class="body">- name: String</text>
    <text x="18" y="150" class="body">+ activate()</text>
    <text x="18" y="174" class="body">+ archive()</text>
  </g>

  <g transform="translate(520,180)">
    <rect x="0" y="0" width="320" height="270" fill="#ffffff" stroke="#0284c7" stroke-width="2.5"/>
    <line x1="0" y1="46" x2="320" y2="46" stroke="#64748b" stroke-width="2"/>
    <line x1="0" y1="172" x2="320" y2="172" stroke="#64748b" stroke-width="2"/>
    <text x="160" y="30" text-anchor="middle" class="name">Project</text>
    <text x="18" y="80" class="body">- id: UUID</text>
    <text x="18" y="104" class="body">- brand: String</text>
    <text x="18" y="128" class="body">- entityType: String</text>
    <text x="18" y="152" class="body">- domainTypeCode: String</text>
    <text x="18" y="206" class="body">+ activate()</text>
    <text x="18" y="230" class="body">+ pause()</text>
    <text x="18" y="254" class="body">+ changeCrawlMode()</text>
  </g>

  <g transform="translate(980,220)">
    <rect x="0" y="0" width="300" height="230" fill="#ffffff" stroke="#0284c7" stroke-width="2.5"/>
    <line x1="0" y1="46" x2="300" y2="46" stroke="#64748b" stroke-width="2"/>
    <line x1="0" y1="142" x2="300" y2="142" stroke="#64748b" stroke-width="2"/>
    <text x="150" y="30" text-anchor="middle" class="name">Datasource</text>
    <text x="18" y="80" class="body">- id: UUID</text>
    <text x="18" y="104" class="body">- sourceType: Platform</text>
    <text x="18" y="128" class="body">- status: DatasourceStatus</text>
    <text x="18" y="176" class="body">+ runDryRun()</text>
    <text x="18" y="200" class="body">+ startRuntime()</text>
    <text x="18" y="224" class="body">+ archive()</text>
  </g>

  <g transform="translate(1400,220)">
    <rect x="0" y="0" width="260" height="190" fill="#ffffff" stroke="#0284c7" stroke-width="2.5"/>
    <line x1="0" y1="46" x2="260" y2="46" stroke="#64748b" stroke-width="2"/>
    <line x1="0" y1="118" x2="260" y2="118" stroke="#64748b" stroke-width="2"/>
    <text x="130" y="30" text-anchor="middle" class="name">CrawlTarget</text>
    <text x="18" y="80" class="body">- id: UUID</text>
    <text x="18" y="104" class="body">- targetType: TargetType</text>
    <text x="18" y="150" class="body">+ schedule()</text>
    <text x="18" y="174" class="body">+ disable()</text>
  </g>

  <g transform="translate(760,700)">
    <rect x="0" y="0" width="300" height="210" fill="#ffffff" stroke="#0284c7" stroke-width="2.5"/>
    <line x1="0" y1="46" x2="300" y2="46" stroke="#64748b" stroke-width="2"/>
    <line x1="0" y1="132" x2="300" y2="132" stroke="#64748b" stroke-width="2"/>
    <text x="150" y="30" text-anchor="middle" class="name">CrisisConfig</text>
    <text x="18" y="80" class="body">- threshold: Decimal</text>
    <text x="18" y="104" class="body">- triggerKeywords: String[]</text>
    <text x="18" y="166" class="body">+ evaluateSignal()</text>
    <text x="18" y="190" class="body">+ shouldEscalate()</text>
  </g>

  <line x1="380" y1="315" x2="520" y2="315" class="edge"/>
  <line x1="840" y1="335" x2="980" y2="335" class="edge"/>
  <line x1="1280" y1="315" x2="1400" y2="315" class="edge"/>
  <line x1="680" y1="450" x2="850" y2="700" class="edge"/>

  <polygon points="508,315 520,308 520,322" class="diamond"/>
  <polygon points="968,335 980,328 980,342" class="diamond"/>
  <polygon points="1388,315 1400,308 1400,322" class="diamond"/>
  <polygon points="842,688 850,700 836,700" class="diamond"/>

  <text x="440" y="292" class="body">1..*</text>
  <text x="905" y="312" class="body">1..*</text>
  <text x="1332" y="292" class="body">1..*</text>
  <text x="875" y="620" class="body">0..1</text>
  <text x="400" y="360" class="body">Campaign contains Projects</text>
  <text x="890" y="380" class="body">Project owns Datasources</text>
  <text x="1320" y="360" class="body">Datasource owns CrawlTargets</text>
  <text x="890" y="655" class="body">Project may define CrisisConfig</text>
</svg>
