apiVersion: v1
kind: ConfigMap
metadata:
  name: smap-ffmpeg-config
  namespace: smap
  labels:
    app: smap-ffmpeg
    component: config
    version: v3
data:
  # ========== Application Settings ==========
  APP_ENV: "production"
  LOG_LEVEL: "INFO"

  # ========== MinIO Configuration ==========
  MINIO_ENDPOINT: "172.16.19.115:9000"
  MINIO_BUCKET: "smap-stt-audio-files"
  MINIO_BUCKET_MODEL: "smap-whisper"
  MINIO_TARGET_PREFIX: "audios"
  MINIO_USE_SSL: "False"
  MINIO_PRESIGNED_TTL: "600"
  MINIO_UPLOAD_PART_SIZE: "5242880"

  # ========== FFmpeg Settings ==========
  FFMPEG_PATH: "ffmpeg"
  FFMPEG_AUDIO_BITRATE: "192k"
  FFMPEG_TIMEOUT_SECONDS: "600"
  MAX_CONCURRENT_JOBS: "2"