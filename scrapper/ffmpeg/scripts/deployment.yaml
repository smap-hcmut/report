apiVersion: apps/v1
kind: Deployment
metadata:
  name: ffmpeg
  namespace: smap
  labels:
    app: ffmpeg
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: ffmpeg
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ffmpeg
    spec:
      imagePullSecrets:
      - name: harbor-secret
      containers:
      - name: ffmpeg
        image: registry.tantai.dev/smap/ffmpeg:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        envFrom:
        - secretRef:
            name: minio-config
        - secretRef:
            name: ffmpeg-config
        env:
        - name: CONTAINER_NAME
          value: "ffmpeg"
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: ffmpeg
  namespace: smap
  labels:
    app: ffmpeg
spec:
  selector:
    app: ffmpeg
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  type: ClusterIP