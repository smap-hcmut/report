apiVersion: apps/v1
kind: Deployment
metadata:
  name: youtube-crawler
  namespace: smap
  labels:
    app: youtube-crawler
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: youtube-crawler
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: youtube-crawler
    spec:
      imagePullSecrets:
      - name: harbor-secret
      containers:
      - name: youtube-crawler
        image: registry.tantai.dev/smap/youtube-scrapper:latest
        imagePullPolicy: Always
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        envFrom:
        - secretRef:
            name: rabbitmq-config
        - secretRef:
            name: mongodb-config
        - secretRef:
            name: minio-config
        - secretRef:
            name: crawler-config
        - secretRef:
            name: app-crawler-config
        - secretRef:
            name: media-config
        env:
        - name: CONTAINER_NAME
          value: "youtube-crawler"
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

---
apiVersion: v1
kind: Service
metadata:
  name: youtube-crawler
  namespace: smap
  labels:
    app: youtube-crawler
spec:
  selector:
    app: youtube-crawler
  type: ClusterIP