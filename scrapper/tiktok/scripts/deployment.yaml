apiVersion: apps/v1
kind: Deployment
metadata:
  name: tiktok-crawler
  namespace: smap
  labels:
    app: tiktok-crawler
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: tiktok-crawler
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: tiktok-crawler
    spec:
      imagePullSecrets:
      - name: harbor-secret
      containers:
      - name: tiktok-crawler
        image: registry.tantai.dev/smap/tiktok-scrapper:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        envFrom:
        - secretRef:
            name: rabbitmq-config
        - secretRef:
            name: mongodb-config
        - secretRef:
            name: minio-config
        - secretRef:
            name: crawler-config
        - secretRef:
            name: app-crawler-config
        - secretRef:
            name: playwright-config
        env:
        - name: CONTAINER_NAME
          value: "tiktok-crawler"
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

---
apiVersion: v1
kind: Service
metadata:
  name: tiktok-crawler
  namespace: smap
  labels:
    app: tiktok-crawler
spec:
  selector:
    app: tiktok-crawler
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  type: ClusterIP