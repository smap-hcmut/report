apiVersion: apps/v1
kind: Deployment
metadata:
  name: smap-tiktok-scraper
  namespace: smap
  labels:
    app: smap-tiktok-scraper
    component: worker
    version: v3
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: smap-tiktok-scraper
  template:
    metadata:
      labels:
        app: smap-tiktok-scraper
        component: worker
        version: v3
      annotations:
        prometheus.io/scrape: "false"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: smap-tiktok-scraper
          image: registry.tantai.dev/smap/smap-tiktok-scraper:251211-205730
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # TikTok worker needs write access for temp files
            capabilities:
              drop:
                - ALL
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: WORKER_NAME
              value: "$(POD_NAME)"
          envFrom:
            - configMapRef:
                name: smap-tiktok-scraper-config
            - secretRef:
                name: smap-tiktok-scraper-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-tmp
              mountPath: /app/tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: app-tmp
          emptyDir:
            sizeLimit: 512Mi
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      # Affinity to spread pods across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: smap-tiktok-scraper
                topologyKey: kubernetes.io/hostname
      # Tolerate node pressure
      tolerations:
        - key: "node.kubernetes.io/memory-pressure"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Exists"
          effect: "NoSchedule"
