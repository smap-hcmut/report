# Docker Compose for testing FFmpeg service integration
# Usage: cd scrapper/youtube/tests && docker-compose -f docker-compose.test.yml up --build

version: '3.8'

services:
  # ========================================
  # MinIO - Object Storage for Test Files
  # ========================================
  minio-test:
    image: minio/minio:latest
    container_name: minio-test
    command: server /data --console-address ":9001"
    ports:
      - "9010:9000"  # API port (different from prod to avoid conflicts)
      - "9011:9001"  # Console port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-test-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  # ========================================
  # FFmpeg Service - Video Conversion
  # ========================================
  ffmpeg-service-test:
    container_name: ffmpeg-service-test
    build:
      context: ../../ffmpeg
      dockerfile: Dockerfile
    environment:
      - MINIO_ENDPOINT=minio-test:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_SOURCE=test-videos
      - MINIO_BUCKET_TARGET=test-audios
      - MINIO_USE_SSL=false
      - LOG_LEVEL=DEBUG
    ports:
      - "8001:8000"  # Different port to avoid conflicts
    depends_on:
      minio-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - test-network

  # ========================================
  # YouTube Scraper - Unit Tests
  # ========================================
  youtube-test-unit:
    container_name: youtube-test-unit
    build:
      context: ..
      dockerfile: tests/Dockerfile.test
      target: test
    command: ["pytest", "tests/unit", "-v", "--cov=.", "--cov-report=html", "--cov-report=term"]
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=DEBUG
    volumes:
      - ../htmlcov:/app/htmlcov  # Coverage reports
      - .:/app/tests  # Mount tests for live editing
    networks:
      - test-network

  # ========================================
  # YouTube Scraper - Integration Tests
  # ========================================
  youtube-test-integration:
    container_name: youtube-test-integration
    build:
      context: ..
      dockerfile: tests/Dockerfile.test
      target: test
    command: ["pytest", "tests/integration", "-v", "-m", "integration"]
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=DEBUG
      # FFmpeg service configuration
      - MEDIA_FFMPEG_SERVICE_URL=http://ffmpeg-service-test:8000
      - MEDIA_FFMPEG_TIMEOUT=180
      - MEDIA_FFMPEG_MAX_RETRIES=3
      # MinIO configuration
      - MINIO_ENDPOINT=minio-test:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=test-videos
      - MINIO_USE_SSL=false
      # Enable real file tests
      - TEST_WITH_REAL_FILES=1
    depends_on:
      ffmpeg-service-test:
        condition: service_healthy
      minio-test:
        condition: service_healthy
    volumes:
      - ../htmlcov:/app/htmlcov
      - .:/app/tests
    networks:
      - test-network

  # ========================================
  # Test Runner - All Tests
  # ========================================
  youtube-test-all:
    container_name: youtube-test-all
    build:
      context: ..
      dockerfile: tests/Dockerfile.test
      target: test
    command: [
      "pytest",
      "tests/",
      "-v",
      "--cov=.",
      "--cov-report=html",
      "--cov-report=term",
      "--cov-report=xml"
    ]
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
      - MEDIA_FFMPEG_SERVICE_URL=http://ffmpeg-service-test:8000
      - MINIO_ENDPOINT=minio-test:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=test-videos
      - MINIO_USE_SSL=false
    depends_on:
      ffmpeg-service-test:
        condition: service_healthy
      minio-test:
        condition: service_healthy
    volumes:
      - ../htmlcov:/app/htmlcov
      - ../.coverage:/app/.coverage
      - ../coverage.xml:/app/coverage.xml
      - .:/app/tests
    networks:
      - test-network

networks:
  test-network:
    driver: bridge

volumes:
  minio-test-data:
    driver: local
