[pytest]
# Pytest configuration for YouTube scraper

# Python path for module imports
pythonpath = ..

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = .

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require external services)
    slow: Slow tests
    asyncio: Async tests

# Coverage options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:warnings

# Async support
asyncio_mode = auto

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout
timeout = 300

# Ignore paths
norecursedirs = .git .tox dist build *.egg __pycache__
