---
# RabbitMQ Configuration Secret
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-config
  namespace: smap
type: Opaque
stringData:
  RABBITMQ_HOST: 172.16.19.112
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: smap
  RABBITMQ_PASSWORD: hcmut
  RABBITMQ_VHOST: /
  RABBITMQ_QUEUE_NAME: tiktok_crawl_queue
  RABBITMQ_EXCHANGE: tiktok_exchange
  RABBITMQ_ROUTING_KEY: tiktok.crawl
  RABBITMQ_PREFETCH_COUNT: "1"

---
# MongoDB Configuration Secret
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-config
  namespace: smap
type: Opaque
stringData:
  MONGODB_HOST: 172.16.19.100
  MONGODB_PORT: "27017"
  MONGODB_USER: smap
  MONGODB_PASSWORD: hcmut2025
  MONGODB_DATABASE: smap
  MONGODB_AUTH_SOURCE: smap

---
# MinIO Configuration Secret
apiVersion: v1
kind: Secret
metadata:
  name: minio-config
  namespace: smap
type: Opaque
stringData:
  MINIO_ENDPOINT: 172.16.19.115:9000
  MINIO_ACCESS_KEY: smap
  MINIO_SECRET_KEY: hcmut2025
  MINIO_BUCKET: smap-stt-audio-files
  MINIO_BUCKET_MODEL: smap-whisper
  MINIO_USE_SSL: "False"

---
# Crawler Settings Secret
apiVersion: v1
kind: Secret
metadata:
  name: crawler-config
  namespace: smap
type: Opaque
stringData:
  CRAWLER_HEADLESS: "True"
  CRAWLER_TIMEOUT: "30000"
  CRAWLER_WAIT_AFTER_LOAD: "3000"
  CRAWLER_SCROLL_DELAY: "1500"
  CRAWLER_MAX_SCROLL_ATTEMPTS: "10"
  CRAWLER_USER_AGENT: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  CRAWLER_MAX_CONCURRENT: "16"
  CRAWLER_REQUESTS_PER_MINUTE: "20"
  CRAWLER_DELAY_MIN: "2"
  CRAWLER_DELAY_MAX: "5"

---
# Application Settings Secret
apiVersion: v1
kind: Secret
metadata:
  name: app-crawler-config
  namespace: smap
type: Opaque
stringData:
  APP_ENV: "development"
  LOG_LEVEL: "INFO"
  WORKER_NAME: "tiktok-crawler-worker"
  WORKER_MAX_RETRIES: "3"
  WORKER_RETRY_DELAY: "5"

---
# Playwright Service Configuration Secret
apiVersion: v1
kind: Secret
metadata:
  name: playwright-config
  namespace: smap
type: Opaque
stringData:
  PLAYWRIGHT_WS_ENDPOINT: "ws://playwright:4444/?headless=1"

