apiVersion: apps/v1
kind: Deployment
metadata:
  name: smap-playwright
  namespace: smap
  labels:
    app: smap-playwright
    component: api
    version: v3
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: smap-playwright
  template:
    metadata:
      labels:
        app: smap-playwright
        component: api
        version: v3
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
        config/hash: "PLACEHOLDER_CONFIG_HASH"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: smap-playwright
          image: registry.tantai.dev/smap/smap-playwright:251217-204341
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # Playwright needs write access for browser data
            capabilities:
              drop:
                - ALL
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DISPLAY
              value: ":99"
          envFrom:
            - configMapRef:
                name: smap-playwright-config
          ports:
            - name: websocket
              containerPort: 4444
              protocol: TCP
            - name: http
              containerPort: 8001
              protocol: TCP
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: playwright-tmp
              mountPath: /srv/playwright_api/tmp
            - name: shared-memory
              mountPath: /dev/shm
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: playwright-tmp
          emptyDir:
            sizeLimit: 512Mi
        - name: shared-memory
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: smap-playwright
                topologyKey: kubernetes.io/hostname
