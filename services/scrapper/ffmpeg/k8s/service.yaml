apiVersion: v1
kind: Service
metadata:
  name: smap-ffmpeg
  namespace: smap
  labels:
    app: smap-ffmpeg
    component: service
    version: v3
spec:
  type: ClusterIP
  selector:
    app: smap-ffmpeg
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: ffmpeg-service-headless
  namespace: smap
  labels:
    app: smap-ffmpeg
    component: service-headless
    version: v3
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: smap-ffmpeg
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP