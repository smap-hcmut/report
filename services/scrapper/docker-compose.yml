

services:
  playwright-service:
    container_name: playwright-service
    image: registry.tantai.dev/smap/smap-playwright:251203-123456
    platform: linux/amd64
    ports:
      - "4444:4444"
      - "8001:8001"
    env_file:
      - ./playwight/.env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  tiktok-worker:
    container_name: tiktok-scraper
    build:
      context: ./tiktok
      dockerfile: Dockerfile
    volumes:
      - ./tiktok:/app
      - /app/.venv
    env_file:
      - ./tiktok/.env
    environment:
      PLAYWRIGHT_WS_ENDPOINT: ws://playwright-service:4444/?headless=1
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # depends_on:
    #   playwright-service:
    #     condition: service_healthy
    command: ["python", "-m", "app.main"]

  youtube-worker:
    container_name: youtube-scraper
    build:
      context: ./youtube
      dockerfile: Dockerfile
    env_file:
      - ./youtube/.env
    command: ["python", "-m", "app.worker_service"]

  ffmpeg-service:
    container_name: ffmpeg-service
    build:
      context: ./ffmpeg
      dockerfile: cmd/api/Dockerfile
    env_file:
      - ./ffmpeg/.env
    ports:
      - "8000:8000"

networks:
  default:
    name: tiktok-net
