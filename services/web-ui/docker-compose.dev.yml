version: "3.9"

services:
  web:
    container_name: smap-web-development
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:5000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      HOSTNAME: "0.0.0.0"
      PORT: "5000"
    volumes:
      # Mount app source for hot reload
      - .:/app:delegated
      # Keep node_modules inside container to avoid host override
      - /app/node_modules
      # Cache Next.js build artifacts for faster reloads between runs
      - next-cache:/app/.next
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    # Speeds up file watching on macOS and Windows
    tty: true
    stdin_open: true

volumes:
  next-cache:


