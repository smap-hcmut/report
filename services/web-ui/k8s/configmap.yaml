apiVersion: v1
kind: ConfigMap
metadata:
  name: smap-web-config
  namespace: smap
  labels:
    app: smap-web
    component: frontend
data:
  # Application (Server-side only)
  NODE_ENV: "production"
  PORT: "5000"
  HOSTNAME: "0.0.0.0"

  # Next.js
  NEXT_TELEMETRY_DISABLED: "1"

  # ⚠️ WARNING: NEXT_PUBLIC_* variables below DO NOT WORK at runtime!
  # They must be set at BUILD TIME via Docker build args.
  # See k8s/BUILD_GUIDE.md for details.
  #
  # These are kept here for documentation only:
  # NEXT_PUBLIC_HOSTNAME: "https://smap-api.tantai.dev"
  # NEXT_PUBLIC_WS_URL: "wss://smap-api.tantai.dev/ws"
  #
  # WebSocket Configuration Notes:
  # - New port: 8081 (changed from 8080)
  # - Authentication: HttpOnly Cookie (no JWT token in URL)
  # - Connection patterns: ?projectId={id} or ?jobId={id}
  # - Supports both Project and Job notifications
