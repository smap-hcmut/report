apiVersion: apps/v1
kind: Deployment
metadata:
  name: smap-web
  namespace: smap
  labels:
    app: smap-web
    component: frontend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: smap-web
  template:
    metadata:
      labels:
        app: smap-web
        component: frontend
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: smap-web
          image: registry.tantai.dev/smap/smap-web:251209-071015
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: smap-web-config
            - secretRef:
                name: smap-web-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      restartPolicy: Always
