# ============================================
# External NGINX Configuration for SMAP Web
# ============================================
# This NGINX sits outside K8s and handles:
# - SSL/TLS termination
# - Routing to K8s Ingress Controller
# - Security headers
# - Rate limiting (optional)

# HTTP server - redirect to HTTPS
server {
    listen 80;
    server_name smap.tantai.dev;

    # Health check endpoint
    location /nginx-health {
        return 200 "smap-web HTTP healthy\n";
        add_header Content-Type text/plain;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server - main configuration
server {
    listen 443 ssl;
    http2 on;
    server_name smap.tantai.dev;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl-certs/smap.tantai.dev/certificate.crt;
    ssl_certificate_key /etc/nginx/ssl-certs/smap.tantai.dev/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Client body size limit
    client_max_body_size 20M;

    # MIME types for Next.js static files
    location ~* \.(webmanifest|json)$ {
        add_header Content-Type application/manifest+json;
        proxy_pass http://k8s_nodes;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Origin $http_origin;
    }

    # Next.js static assets - aggressive caching
    location /_next/static/ {
        proxy_pass http://k8s_nodes;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Origin $http_origin;
        
        # Cache static assets
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=3600, immutable";
    }

    # Main application
    location / {
        proxy_pass http://k8s_nodes;
        proxy_http_version 1.1;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # CRITICAL: Preserve Origin header for CORS
        # This is required for cross-origin API calls
        proxy_set_header Origin $http_origin;
        
        # Preserve Referer header
        proxy_set_header Referer $http_referer;

        # WebSocket support
        # Updated for new WebSocket specification:
        # - Backend port: 8081 (changed from 8080)
        # - Authentication: HttpOnly Cookie (automatic, no token in URL)
        # - Connection patterns: /ws?projectId={id} or /ws?jobId={id}
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Gzip compression
        proxy_set_header Accept-Encoding gzip;
    }

    # NGINX health check
    location /nginx-health {
        return 200 "smap-web HTTPS healthy\n";
        add_header Content-Type text/plain;
    }

    # Application health check (proxy to K8s)
    location /health {
        proxy_pass http://k8s_nodes;
        proxy_set_header Host $host;
        access_log off;
    }
}
