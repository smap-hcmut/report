apiVersion: v1
kind: Service
metadata:
  name: smap-web-service
  namespace: smap
  labels:
    app: smap-web
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: smap-web
  ports:
    - name: http
      port: 80
      targetPort: 5000
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
