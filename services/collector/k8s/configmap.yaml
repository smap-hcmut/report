apiVersion: v1
kind: ConfigMap
metadata:
  name: smap-collector-config
  namespace: smap
  labels:
    app: smap-collector-consumer
data:
  # Logger Configuration
  LOGGER_LEVEL: "info"
  LOGGER_MODE: "production"
  LOGGER_ENCODING: "json"
  LOGGER_COLOR_ENABLED: "false"

  # Redis Configuration (Standalone mode only)
  REDIS_HOST: "redis-service:6379"
  REDIS_DB: "0"
  REDIS_STATE_DB: "1"
  REDIS_MIN_IDLE_CONNS: "10"
  REDIS_POOL_SIZE: "100"
  REDIS_POOL_TIMEOUT: "30"

  # Project Service Configuration (same namespace)
  PROJECT_SERVICE_URL: "http://smap-project-api"
  PROJECT_TIMEOUT: "10"
  WEBHOOK_RETRY_ATTEMPTS: "5"
  WEBHOOK_RETRY_DELAY: "1"

  # Crawl Limits Configuration
  DEFAULT_LIMIT_PER_KEYWORD: "50"
  DEFAULT_MAX_COMMENTS: "100"
  DEFAULT_MAX_ATTEMPTS: "3"
  DRYRUN_LIMIT_PER_KEYWORD: "3"
  DRYRUN_MAX_COMMENTS: "5"
  MAX_LIMIT_PER_KEYWORD: "500"
  MAX_MAX_COMMENTS: "1000"
  INCLUDE_COMMENTS: "true"
  DOWNLOAD_MEDIA: "false"
