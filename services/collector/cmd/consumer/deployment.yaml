apiVersion: apps/v1
kind: Deployment
metadata:
  name: smap-collector-consumer
  namespace: smap
  labels:
    app: smap-collector-consumer
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: smap-collector-consumer
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: smap-collector-consumer
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: smap-collector-consumer
          image: registry.tantai.dev/smap/smap-collector:251209-043818
          imagePullPolicy: Always
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          envFrom:
            - configMapRef:
                name: smap-collector-config
            - secretRef:
                name: smap-collector-secrets
          env:
            - name: CONTAINER_NAME
              value: "smap-collector-consumer"
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pgrep -f consumer || exit 1
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pgrep -f consumer || exit 1
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
