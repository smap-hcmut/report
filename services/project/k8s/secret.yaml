apiVersion: v1
kind: Secret
metadata:
  name: smap-project-secrets
  namespace: smap
  labels:
    app: smap-project-api
type: Opaque
stringData:
  # Discord Configuration
  DISCORD_WEBHOOK_ID: "CHANGE_ME"
  DISCORD_WEBHOOK_TOKEN: "CHANGE_ME"

  # Encrypter Configuration
  ENCRYPT_KEY: "CHANGE_ME_GENERATE_32_BYTE_KEY"

  # Internal Configuration
  INTERNAL_KEY: "CHANGE_ME_GENERATE_STRONG_KEY"

  # JWT Configuration
  JWT_SECRET: "CHANGE_ME_GENERATE_STRONG_SECRET"

  # LLM Configuration
  LLM_API_KEY: "CHANGE_ME"

  # PostgreSQL Configuration
  POSTGRES_DB: "smap_project"
  POSTGRES_HOST: "postgres-service.smap.svc.cluster.local"
  POSTGRES_PASSWORD: "CHANGE_ME"
  POSTGRES_PORT: "5432"
  POSTGRES_SSLMODE: "require"
  POSTGRES_USER: "smap_user"

  # RabbitMQ Configuration
  RABBITMQ_URL: "amqp://user:password@rabbitmq-service.smap.svc.cluster.local:5672/"

  # Redis Configuration
  REDIS_PASSWORD: "21042004"
