apiVersion: v1
kind: ConfigMap
metadata:
  name: smap-project-config
  namespace: smap
  labels:
    app: smap-project-api
data:
  API_MODE: "release"
  APP_PORT: "8080"
  # Environment Configuration
  ENV: "production"

  # HTTP Server Configuration
  HOST: "0.0.0.0"

  # Logger Configuration
  LOGGER_LEVEL: "info"
  LOGGER_MODE: "production"
  LOGGER_ENCODING: "json"
  LOGGER_COLOR_ENABLED: "false"

  # Redis Configuration (Standalone mode only)
  REDIS_HOST: "redis-service:6379"
  REDIS_DB: "0"
  REDIS_STATE_DB: "1"
  REDIS_MIN_IDLE_CONNS: "10"
  REDIS_POOL_SIZE: "100"
  REDIS_POOL_TIMEOUT: "30"

  # Cookie Configuration (for HttpOnly authentication)
  COOKIE_DOMAIN: ".smap.com"
  COOKIE_SECURE: "true"
  COOKIE_SAMESITE: "Lax"
  COOKIE_MAX_AGE: "7200"
  COOKIE_MAX_AGE_REMEMBER: "2592000"
  COOKIE_NAME: "smap_auth_token"

  # Identity Service Configuration (same namespace, use short service name)
  IDENTITY_SERVICE_URL: "http://smap-identity-api"
  IDENTITY_TIMEOUT: "30"

  # LLM Configuration
  LLM_PROVIDER: "gemini"
  LLM_MODEL: "gemini-2.0-flash"
  LLM_TIMEOUT: "30"
  LLM_MAX_RETRIES: "3"

  # Dry-Run Keyword Sampling Configuration
  DRY_RUN_PERCENTAGE: "10"
  DRY_RUN_MIN_KEYWORDS: "3"
  DRY_RUN_MAX_KEYWORDS: "5"
  DRY_RUN_KEYWORD_TIME_ESTIMATE: "16s"
  DRY_RUN_SAMPLING_STRATEGY: "percentage"
  DRY_RUN_EMERGENCY_THRESHOLD: "70s"
  DRY_RUN_EMERGENCY_KEYWORDS: "3"
