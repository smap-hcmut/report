<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="820" viewBox="0 0 1360 820">
  <defs>
    <style>
      .labelbox { fill: #ece9ff; stroke: #cfc8ff; stroke-width: 1; }
      .lifeline { stroke: #d4ccff; stroke-width: 2; }
      .msg { stroke: #333333; stroke-width: 1.6; fill: none; }
      .ret { stroke: #555555; stroke-width: 1.3; stroke-dasharray: 5 4; fill: none; }
      .alt { fill: none; stroke: #d4ccff; stroke-width: 1.2; stroke-dasharray: 3 3; }
      .note { fill: #fff4b8; stroke: #e1d27a; stroke-width: 1.2; }
      .t { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #222222; }
      .ts { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #222222; }
      .tc { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #222222; }
      .step { fill: #333333; }
      .steptext { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #ffffff; font-weight: bold; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333" />
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555555" />
    </marker>
  </defs>
  <rect x="0" y="0" width="1360" height="820" fill="#ffffff"/>

  <rect class="labelbox" x="18" y="18" width="96" height="42" rx="2"/>
  <rect class="labelbox" x="168" y="18" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="388" y="18" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="598" y="18" width="136" height="42" rx="2"/>
  <rect class="labelbox" x="808" y="18" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="1028" y="18" width="116" height="42" rx="2"/>
  <rect class="labelbox" x="1218" y="18" width="116" height="42" rx="2"/>

  <text class="t" x="66" y="44" text-anchor="middle">User</text>
  <text class="t" x="231" y="44" text-anchor="middle">Giao diện</text>
  <text class="t" x="461" y="36" text-anchor="middle">Knowledge Service</text><text class="ts" x="461" y="50" text-anchor="middle">(search API)</text>
  <text class="t" x="666" y="36" text-anchor="middle">Redis Cache</text><text class="ts" x="666" y="50" text-anchor="middle">(search results)</text>
  <text class="t" x="871" y="36" text-anchor="middle">Project Service</text><text class="ts" x="871" y="50" text-anchor="middle">(campaign scope)</text>
  <text class="t" x="1086" y="36" text-anchor="middle">Embedding</text><text class="ts" x="1086" y="50" text-anchor="middle">(query vector)</text>
  <text class="t" x="1276" y="36" text-anchor="middle">Qdrant</text><text class="ts" x="1276" y="50" text-anchor="middle">(project collections)</text>

  <rect class="labelbox" x="18" y="760" width="96" height="42" rx="2"/>
  <rect class="labelbox" x="168" y="760" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="388" y="760" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="598" y="760" width="136" height="42" rx="2"/>
  <rect class="labelbox" x="808" y="760" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="1028" y="760" width="116" height="42" rx="2"/>
  <rect class="labelbox" x="1218" y="760" width="116" height="42" rx="2"/>

  <text class="t" x="66" y="786" text-anchor="middle">User</text>
  <text class="t" x="231" y="786" text-anchor="middle">Giao diện</text>
  <text class="t" x="461" y="778" text-anchor="middle">Knowledge Service</text><text class="ts" x="461" y="792" text-anchor="middle">(search API)</text>
  <text class="t" x="666" y="778" text-anchor="middle">Redis Cache</text><text class="ts" x="666" y="792" text-anchor="middle">(search results)</text>
  <text class="t" x="871" y="778" text-anchor="middle">Project Service</text><text class="ts" x="871" y="792" text-anchor="middle">(campaign scope)</text>
  <text class="t" x="1086" y="778" text-anchor="middle">Embedding</text><text class="ts" x="1086" y="792" text-anchor="middle">(query vector)</text>
  <text class="t" x="1276" y="778" text-anchor="middle">Qdrant</text><text class="ts" x="1276" y="792" text-anchor="middle">(project collections)</text>

  <line class="lifeline" x1="66" y1="60" x2="66" y2="760"/>
  <line class="lifeline" x1="231" y1="60" x2="231" y2="760"/>
  <line class="lifeline" x1="461" y1="60" x2="461" y2="760"/>
  <line class="lifeline" x1="666" y1="60" x2="666" y2="760"/>
  <line class="lifeline" x1="871" y1="60" x2="871" y2="760"/>
  <line class="lifeline" x1="1086" y1="60" x2="1086" y2="760"/>
  <line class="lifeline" x1="1276" y1="60" x2="1276" y2="760"/>

  <circle class="step" cx="66" cy="98" r="8"/><text class="steptext" x="66" y="102" text-anchor="middle">1</text>
  <line class="msg" x1="74" y1="98" x2="223" y2="98" marker-end="url(#arrow)"/>
  <text class="t" x="149" y="92" text-anchor="middle">Nhập truy vấn tra cứu</text>

  <circle class="step" cx="231" cy="150" r="8"/><text class="steptext" x="231" y="154" text-anchor="middle">2</text>
  <line class="msg" x1="239" y1="150" x2="453" y2="150" marker-end="url(#arrow)"/>
  <text class="ts" x="346" y="138" text-anchor="middle">POST /search</text>
  <text class="ts" x="346" y="152" text-anchor="middle">{campaign_id, query, filters}</text>

  <circle class="step" cx="461" cy="198" r="8"/><text class="steptext" x="461" y="202" text-anchor="middle">3</text>
  <line class="msg" x1="469" y1="198" x2="658" y2="198" marker-end="url(#arrow)"/>
  <text class="ts" x="563" y="186" text-anchor="middle">Check search cache</text>

  <rect class="alt" x="438" y="224" width="274" height="90"/>
  <rect x="438" y="224" width="28" height="16" fill="#ece9ff" stroke="#d4ccff" stroke-width="1"/>
  <text class="tc" x="452" y="236" text-anchor="middle">alt</text>
  <text class="tc" x="520" y="238">[Cache hit]</text>
  <circle class="step" cx="666" cy="264" r="8"/><text class="steptext" x="666" y="268" text-anchor="middle">4</text>
  <line class="ret" x1="658" y1="264" x2="469" y2="264" marker-end="url(#arrowDash)"/>
  <text class="ts" x="563" y="258" text-anchor="middle">cached results</text>

  <rect class="alt" x="760" y="224" width="548" height="260"/>
  <rect x="760" y="224" width="28" height="16" fill="#ece9ff" stroke="#d4ccff" stroke-width="1"/>
  <text class="tc" x="774" y="236" text-anchor="middle">alt</text>
  <text class="tc" x="854" y="238">[Cache miss]</text>

  <circle class="step" cx="461" cy="280" r="8"/><text class="steptext" x="461" y="284" text-anchor="middle">5</text>
  <line class="msg" x1="469" y1="280" x2="863" y2="280" marker-end="url(#arrow)"/>
  <text class="ts" x="666" y="268" text-anchor="middle">Resolve campaign -> project_ids</text>

  <circle class="step" cx="871" cy="304" r="8"/><text class="steptext" x="871" y="308" text-anchor="middle">6</text>
  <line class="ret" x1="863" y1="304" x2="469" y2="304" marker-end="url(#arrowDash)"/>
  <text class="ts" x="666" y="298" text-anchor="middle">project scope</text>

  <circle class="step" cx="461" cy="350" r="8"/><text class="steptext" x="461" y="354" text-anchor="middle">7</text>
  <line class="msg" x1="469" y1="350" x2="1078" y2="350" marker-end="url(#arrow)"/>
  <text class="ts" x="774" y="338" text-anchor="middle">Generate query embedding</text>

  <circle class="step" cx="1086" cy="374" r="8"/><text class="steptext" x="1086" y="378" text-anchor="middle">8</text>
  <line class="ret" x1="1078" y1="374" x2="469" y2="374" marker-end="url(#arrowDash)"/>
  <text class="ts" x="774" y="368" text-anchor="middle">query vector</text>

  <circle class="step" cx="461" cy="420" r="8"/><text class="steptext" x="461" y="424" text-anchor="middle">9</text>
  <line class="msg" x1="469" y1="420" x2="1268" y2="420" marker-end="url(#arrow)"/>
  <text class="ts" x="868" y="408" text-anchor="middle">Search parallel trên các project collections</text>

  <circle class="step" cx="1276" cy="444" r="8"/><text class="steptext" x="1276" y="448" text-anchor="middle">10</text>
  <line class="ret" x1="1268" y1="444" x2="469" y2="444" marker-end="url(#arrowDash)"/>
  <text class="ts" x="868" y="438" text-anchor="middle">retrieved points + payload</text>

  <circle class="step" cx="461" cy="492" r="8"/><text class="steptext" x="461" y="496" text-anchor="middle">11</text>
  <line class="msg" x1="469" y1="492" x2="658" y2="492" marker-end="url(#arrow)"/>
  <text class="ts" x="563" y="480" text-anchor="middle">Save cache if applicable</text>

  <circle class="step" cx="461" cy="548" r="8"/><text class="steptext" x="461" y="552" text-anchor="middle">12</text>
  <line class="ret" x1="453" y1="548" x2="239" y2="548" marker-end="url(#arrowDash)"/>
  <text class="ts" x="346" y="536" text-anchor="middle">search results + aggregations</text>

  <circle class="step" cx="231" cy="594" r="8"/><text class="steptext" x="231" y="598" text-anchor="middle">13</text>
  <line class="ret" x1="223" y1="594" x2="74" y2="594" marker-end="url(#arrowDash)"/>
  <text class="ts" x="149" y="582" text-anchor="middle">Hiển thị kết quả tra cứu</text>

  <rect class="note" x="44" y="674" width="1272" height="50"/>
  <text class="t" x="680" y="696" text-anchor="middle">Tra cứu chỉ trả về dữ liệu đã được chuẩn bị trong knowledge layer và đã qua bước giới hạn phạm vi theo campaign.</text>
  <text class="t" x="680" y="712" text-anchor="middle">Giao diện không truy cập trực tiếp vector store hay dữ liệu phân tích gốc.</text>
</svg>
