<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="820" viewBox="0 0 1320 820">
  <defs>
    <style>
      .labelbox { fill: #ece9ff; stroke: #cfc8ff; stroke-width: 1; }
      .lifeline { stroke: #d4ccff; stroke-width: 2; }
      .msg { stroke: #333333; stroke-width: 1.6; fill: none; }
      .ret { stroke: #555555; stroke-width: 1.3; stroke-dasharray: 5 4; fill: none; }
      .note { fill: #fff4b8; stroke: #e1d27a; stroke-width: 1.2; }
      .alt { fill: none; stroke: #d4ccff; stroke-width: 1.2; stroke-dasharray: 3 3; }
      .t { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #222222; }
      .ts { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #222222; }
      .tc { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #222222; }
      .step { fill: #333333; }
      .steptext { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #ffffff; font-weight: bold; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333" />
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555555" />
    </marker>
  </defs>
  <rect x="0" y="0" width="1320" height="820" fill="#ffffff"/>

  <rect class="labelbox" x="18" y="18" width="96" height="42" rx="2"/>
  <rect class="labelbox" x="178" y="18" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="388" y="18" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="608" y="18" width="136" height="42" rx="2"/>
  <rect class="labelbox" x="808" y="18" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="1048" y="18" width="160" height="42" rx="2"/>

  <text class="t" x="66" y="44" text-anchor="middle">User</text>
  <text class="t" x="241" y="44" text-anchor="middle">Giao diện</text>
  <text class="t" x="461" y="36" text-anchor="middle">Project Service</text><text class="ts" x="461" y="50" text-anchor="middle">(lifecycle control)</text>
  <text class="t" x="676" y="36" text-anchor="middle">Ingest Service</text><text class="ts" x="676" y="50" text-anchor="middle">(readiness + activate)</text>
  <text class="t" x="881" y="36" text-anchor="middle">PostgreSQL</text><text class="ts" x="881" y="50" text-anchor="middle">(project schema)</text>
  <text class="t" x="1128" y="36" text-anchor="middle">PostgreSQL</text><text class="ts" x="1128" y="50" text-anchor="middle">(ingest schema)</text>

  <rect class="labelbox" x="18" y="760" width="96" height="42" rx="2"/>
  <rect class="labelbox" x="178" y="760" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="388" y="760" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="608" y="760" width="136" height="42" rx="2"/>
  <rect class="labelbox" x="808" y="760" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="1048" y="760" width="160" height="42" rx="2"/>

  <text class="t" x="66" y="786" text-anchor="middle">User</text>
  <text class="t" x="241" y="786" text-anchor="middle">Giao diện</text>
  <text class="t" x="461" y="778" text-anchor="middle">Project Service</text><text class="ts" x="461" y="792" text-anchor="middle">(lifecycle control)</text>
  <text class="t" x="676" y="778" text-anchor="middle">Ingest Service</text><text class="ts" x="676" y="792" text-anchor="middle">(readiness + activate)</text>
  <text class="t" x="881" y="778" text-anchor="middle">PostgreSQL</text><text class="ts" x="881" y="792" text-anchor="middle">(project schema)</text>
  <text class="t" x="1128" y="778" text-anchor="middle">PostgreSQL</text><text class="ts" x="1128" y="792" text-anchor="middle">(ingest schema)</text>

  <line class="lifeline" x1="66" y1="60" x2="66" y2="760"/>
  <line class="lifeline" x1="241" y1="60" x2="241" y2="760"/>
  <line class="lifeline" x1="461" y1="60" x2="461" y2="760"/>
  <line class="lifeline" x1="676" y1="60" x2="676" y2="760"/>
  <line class="lifeline" x1="881" y1="60" x2="881" y2="760"/>
  <line class="lifeline" x1="1128" y1="60" x2="1128" y2="760"/>

  <circle class="step" cx="66" cy="98" r="8"/><text class="steptext" x="66" y="102" text-anchor="middle">1</text>
  <line class="msg" x1="74" y1="98" x2="233" y2="98" marker-end="url(#arrow)"/>
  <text class="t" x="154" y="92" text-anchor="middle">Mở project cần vận hành</text>

  <circle class="step" cx="241" cy="150" r="8"/><text class="steptext" x="241" y="154" text-anchor="middle">2</text>
  <line class="msg" x1="249" y1="150" x2="453" y2="150" marker-end="url(#arrow)"/>
  <text class="ts" x="351" y="138" text-anchor="middle">Yêu cầu kiểm tra mức sẵn sàng</text>

  <circle class="step" cx="461" cy="198" r="8"/><text class="steptext" x="461" y="202" text-anchor="middle">3</text>
  <line class="msg" x1="469" y1="198" x2="668" y2="198" marker-end="url(#arrow)"/>
  <text class="ts" x="568" y="186" text-anchor="middle">GET activation-readiness</text>

  <circle class="step" cx="676" cy="244" r="8"/><text class="steptext" x="676" y="248" text-anchor="middle">4</text>
  <line class="msg" x1="684" y1="244" x2="1120" y2="244" marker-end="url(#arrow)"/>
  <text class="ts" x="902" y="232" text-anchor="middle">Đánh giá datasource, target active và bằng chứng dry run</text>

  <circle class="step" cx="1128" cy="270" r="8"/><text class="steptext" x="1128" y="274" text-anchor="middle">5</text>
  <line class="ret" x1="1120" y1="270" x2="684" y2="270" marker-end="url(#arrowDash)"/>
  <text class="ts" x="902" y="264" text-anchor="middle">readiness result</text>

  <circle class="step" cx="676" cy="314" r="8"/><text class="steptext" x="676" y="318" text-anchor="middle">6</text>
  <line class="ret" x1="668" y1="314" x2="469" y2="314" marker-end="url(#arrowDash)"/>
  <text class="ts" x="568" y="308" text-anchor="middle">Can proceed / blocked reason</text>

  <rect class="alt" x="418" y="338" width="320" height="96"/>
  <rect x="418" y="338" width="28" height="16" fill="#ece9ff" stroke="#d4ccff" stroke-width="1"/>
  <text class="tc" x="432" y="350" text-anchor="middle">alt</text>
  <text class="tc" x="520" y="352">[Readiness không đạt]</text>
  <circle class="step" cx="461" cy="382" r="8"/><text class="steptext" x="461" y="386" text-anchor="middle">7</text>
  <line class="ret" x1="453" y1="382" x2="249" y2="382" marker-end="url(#arrowDash)"/>
  <text class="ts" x="351" y="370" text-anchor="middle">Trả lý do chưa đủ điều kiện</text>

  <circle class="step" cx="241" cy="470" r="8"/><text class="steptext" x="241" y="474" text-anchor="middle">8</text>
  <line class="msg" x1="249" y1="470" x2="453" y2="470" marker-end="url(#arrow)"/>
  <text class="ts" x="351" y="458" text-anchor="middle">User xác nhận activate</text>

  <circle class="step" cx="461" cy="518" r="8"/><text class="steptext" x="461" y="522" text-anchor="middle">9</text>
  <line class="msg" x1="469" y1="518" x2="668" y2="518" marker-end="url(#arrow)"/>
  <text class="ts" x="568" y="506" text-anchor="middle">POST activate</text>

  <circle class="step" cx="676" cy="562" r="8"/><text class="steptext" x="676" y="566" text-anchor="middle">10</text>
  <line class="msg" x1="684" y1="562" x2="1120" y2="562" marker-end="url(#arrow)"/>
  <text class="ts" x="902" y="550" text-anchor="middle">Cập nhật datasource đủ điều kiện sang ACTIVE</text>

  <circle class="step" cx="461" cy="606" r="8"/><text class="steptext" x="461" y="610" text-anchor="middle">11</text>
  <line class="msg" x1="469" y1="606" x2="873" y2="606" marker-end="url(#arrow)"/>
  <text class="ts" x="671" y="594" text-anchor="middle">Cập nhật project.status = ACTIVE</text>

  <circle class="step" cx="881" cy="632" r="8"/><text class="steptext" x="881" y="636" text-anchor="middle">12</text>
  <line class="ret" x1="873" y1="632" x2="469" y2="632" marker-end="url(#arrowDash)"/>
  <text class="ts" x="671" y="626" text-anchor="middle">project active</text>

  <circle class="step" cx="241" cy="676" r="8"/><text class="steptext" x="241" y="680" text-anchor="middle">13</text>
  <line class="ret" x1="453" y1="676" x2="249" y2="676" marker-end="url(#arrowDash)"/>
  <text class="ts" x="351" y="664" text-anchor="middle">Activate thành công</text>

  <rect class="note" x="44" y="698" width="1232" height="44"/>
  <text class="t" x="660" y="720" text-anchor="middle">Luồng này nhấn mạnh control plane: Project Service kiểm tra và quyết định, Ingest Service áp dụng readiness và lifecycle ở execution plane.</text>
</svg>
