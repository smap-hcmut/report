<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="780" viewBox="0 0 1320 780">
  <defs>
    <style>
      .labelbox { fill: #ece9ff; stroke: #cfc8ff; stroke-width: 1; }
      .lifeline { stroke: #d4ccff; stroke-width: 2; }
      .msg { stroke: #333333; stroke-width: 1.6; fill: none; }
      .ret { stroke: #555555; stroke-width: 1.3; stroke-dasharray: 5 4; fill: none; }
      .note { fill: #fff4b8; stroke: #e1d27a; stroke-width: 1.2; }
      .alt { fill: none; stroke: #d4ccff; stroke-width: 1.2; stroke-dasharray: 3 3; }
      .t { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #222222; }
      .ts { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #222222; }
      .tc { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #222222; }
      .step { fill: #333333; }
      .steptext { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #ffffff; font-weight: bold; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333" />
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555555" />
    </marker>
  </defs>
  <rect x="0" y="0" width="1320" height="780" fill="#ffffff"/>

  <rect class="labelbox" x="18" y="18" width="96" height="42" rx="2"/>
  <rect class="labelbox" x="178" y="18" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="388" y="18" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="588" y="18" width="116" height="42" rx="2"/>
  <rect class="labelbox" x="768" y="18" width="136" height="42" rx="2"/>
  <rect class="labelbox" x="978" y="18" width="156" height="42" rx="2"/>
  <rect class="labelbox" x="1178" y="18" width="120" height="42" rx="2"/>

  <text class="t" x="66" y="44" text-anchor="middle">User</text>
  <text class="t" x="241" y="44" text-anchor="middle">Giao diện</text>
  <text class="t" x="461" y="36" text-anchor="middle">Ingest Service</text><text class="ts" x="461" y="50" text-anchor="middle">(dry run)</text>
  <text class="t" x="646" y="36" text-anchor="middle">RabbitMQ</text>
  <text class="t" x="836" y="36" text-anchor="middle">Scapper Worker</text><text class="ts" x="836" y="50" text-anchor="middle">(dry run task)</text>
  <text class="t" x="1056" y="36" text-anchor="middle">MinIO</text><text class="ts" x="1056" y="50" text-anchor="middle">(sample artifact)</text>
  <text class="t" x="1238" y="36" text-anchor="middle">PostgreSQL</text><text class="ts" x="1238" y="50" text-anchor="middle">(dryrun_results)</text>

  <rect class="labelbox" x="18" y="720" width="96" height="42" rx="2"/>
  <rect class="labelbox" x="178" y="720" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="388" y="720" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="588" y="720" width="116" height="42" rx="2"/>
  <rect class="labelbox" x="768" y="720" width="136" height="42" rx="2"/>
  <rect class="labelbox" x="978" y="720" width="156" height="42" rx="2"/>
  <rect class="labelbox" x="1178" y="720" width="120" height="42" rx="2"/>

  <text class="t" x="66" y="746" text-anchor="middle">User</text>
  <text class="t" x="241" y="746" text-anchor="middle">Giao diện</text>
  <text class="t" x="461" y="738" text-anchor="middle">Ingest Service</text><text class="ts" x="461" y="752" text-anchor="middle">(dry run)</text>
  <text class="t" x="646" y="746" text-anchor="middle">RabbitMQ</text>
  <text class="t" x="836" y="738" text-anchor="middle">Scapper Worker</text><text class="ts" x="836" y="752" text-anchor="middle">(dry run task)</text>
  <text class="t" x="1056" y="738" text-anchor="middle">MinIO</text><text class="ts" x="1056" y="752" text-anchor="middle">(sample artifact)</text>
  <text class="t" x="1238" y="738" text-anchor="middle">PostgreSQL</text><text class="ts" x="1238" y="752" text-anchor="middle">(dryrun_results)</text>

  <line class="lifeline" x1="66" y1="60" x2="66" y2="720"/>
  <line class="lifeline" x1="241" y1="60" x2="241" y2="720"/>
  <line class="lifeline" x1="461" y1="60" x2="461" y2="720"/>
  <line class="lifeline" x1="646" y1="60" x2="646" y2="720"/>
  <line class="lifeline" x1="836" y1="60" x2="836" y2="720"/>
  <line class="lifeline" x1="1056" y1="60" x2="1056" y2="720"/>
  <line class="lifeline" x1="1238" y1="60" x2="1238" y2="720"/>

  <circle class="step" cx="66" cy="98" r="8"/><text class="steptext" x="66" y="102" text-anchor="middle">1</text>
  <line class="msg" x1="74" y1="98" x2="233" y2="98" marker-end="url(#arrow)"/>
  <text class="t" x="154" y="92" text-anchor="middle">Yêu cầu chạy kiểm tra thử</text>

  <circle class="step" cx="241" cy="154" r="8"/><text class="steptext" x="241" y="158" text-anchor="middle">2</text>
  <line class="msg" x1="249" y1="154" x2="453" y2="154" marker-end="url(#arrow)"/>
  <text class="ts" x="351" y="142" text-anchor="middle">trigger dry run(datasource_id, target_id)</text>

  <circle class="step" cx="461" cy="212" r="8"/><text class="steptext" x="461" y="216" text-anchor="middle">3</text>
  <line class="msg" x1="469" y1="212" x2="1230" y2="212" marker-end="url(#arrow)"/>
  <text class="ts" x="850" y="200" text-anchor="middle">Tạo dryrun_result ở trạng thái RUNNING</text>

  <circle class="step" cx="1238" cy="236" r="8"/><text class="steptext" x="1238" y="240" text-anchor="middle">4</text>
  <line class="ret" x1="1230" y1="236" x2="469" y2="236" marker-end="url(#arrowDash)"/>
  <text class="ts" x="850" y="230" text-anchor="middle">dryrun request persisted</text>

  <circle class="step" cx="461" cy="292" r="8"/><text class="steptext" x="461" y="296" text-anchor="middle">5</text>
  <line class="msg" x1="469" y1="292" x2="638" y2="292" marker-end="url(#arrow)"/>
  <text class="ts" x="553" y="280" text-anchor="middle">Publish dry run task</text>

  <circle class="step" cx="646" cy="336" r="8"/><text class="steptext" x="646" y="340" text-anchor="middle">6</text>
  <line class="msg" x1="654" y1="336" x2="828" y2="336" marker-end="url(#arrow)"/>
  <text class="ts" x="741" y="324" text-anchor="middle">Deliver task</text>

  <rect class="alt" x="820" y="358" width="300" height="86"/>
  <rect x="820" y="358" width="28" height="16" fill="#ece9ff" stroke="#d4ccff" stroke-width="1"/>
  <text class="tc" x="834" y="370" text-anchor="middle">alt</text>
  <text class="tc" x="928" y="372">[Cần artifact mẫu]</text>

  <circle class="step" cx="836" cy="392" r="8"/><text class="steptext" x="836" y="396" text-anchor="middle">7</text>
  <line class="msg" x1="844" y1="392" x2="1048" y2="392" marker-end="url(#arrow)"/>
  <text class="ts" x="946" y="380" text-anchor="middle">Upload sample artifact</text>

  <circle class="step" cx="1056" cy="416" r="8"/><text class="steptext" x="1056" y="420" text-anchor="middle">8</text>
  <line class="ret" x1="1048" y1="416" x2="844" y2="416" marker-end="url(#arrowDash)"/>
  <text class="ts" x="946" y="410" text-anchor="middle">storage metadata</text>

  <circle class="step" cx="836" cy="482" r="8"/><text class="steptext" x="836" y="486" text-anchor="middle">9</text>
  <line class="msg" x1="828" y1="482" x2="654" y2="482" marker-end="url(#arrow)"/>
  <text class="ts" x="741" y="470" text-anchor="middle">Publish dry run completion</text>

  <circle class="step" cx="646" cy="526" r="8"/><text class="steptext" x="646" y="530" text-anchor="middle">10</text>
  <line class="msg" x1="638" y1="526" x2="469" y2="526" marker-end="url(#arrow)"/>
  <text class="ts" x="553" y="514" text-anchor="middle">Completion delivered</text>

  <circle class="step" cx="461" cy="570" r="8"/><text class="steptext" x="461" y="574" text-anchor="middle">11</text>
  <line class="msg" x1="469" y1="570" x2="1230" y2="570" marker-end="url(#arrow)"/>
  <text class="ts" x="850" y="558" text-anchor="middle">Update latest result và readiness evidence</text>

  <circle class="step" cx="1238" cy="594" r="8"/><text class="steptext" x="1238" y="598" text-anchor="middle">12</text>
  <line class="ret" x1="1230" y1="594" x2="469" y2="594" marker-end="url(#arrowDash)"/>
  <text class="ts" x="850" y="588" text-anchor="middle">dryrun status persisted</text>

  <circle class="step" cx="461" cy="640" r="8"/><text class="steptext" x="461" y="644" text-anchor="middle">13</text>
  <line class="ret" x1="453" y1="640" x2="249" y2="640" marker-end="url(#arrowDash)"/>
  <text class="ts" x="351" y="628" text-anchor="middle">latest result + readiness state</text>

  <rect class="note" x="44" y="670" width="1232" height="50"/>
  <text class="t" x="660" y="692" text-anchor="middle">Luồng này chỉ tạo bằng chứng readiness cho datasource hoặc target.</text>
  <text class="t" x="660" y="708" text-anchor="middle">Quyết định kích hoạt và vận hành chính thức thuộc UC-02, không nằm trong flow thiết lập này.</text>
</svg>
