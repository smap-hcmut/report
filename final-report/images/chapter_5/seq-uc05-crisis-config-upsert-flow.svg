<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="820" viewBox="0 0 1320 820">
  <defs>
    <style>
      .labelbox { fill: #ece9ff; stroke: #cfc8ff; stroke-width: 1; }
      .lifeline { stroke: #d4ccff; stroke-width: 2; }
      .msg { stroke: #333333; stroke-width: 1.6; fill: none; }
      .ret { stroke: #555555; stroke-width: 1.3; stroke-dasharray: 5 4; fill: none; }
      .alt { fill: none; stroke: #d4ccff; stroke-width: 1.2; stroke-dasharray: 3 3; }
      .note { fill: #fff4b8; stroke: #e1d27a; stroke-width: 1.2; }
      .t { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #222222; }
      .ts { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #222222; }
      .tc { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #222222; }
      .step { fill: #333333; }
      .steptext { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #ffffff; font-weight: bold; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333" />
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555555" />
    </marker>
  </defs>
  <rect x="0" y="0" width="1320" height="820" fill="#ffffff"/>

  <rect class="labelbox" x="18" y="18" width="96" height="42" rx="2"/>
  <rect class="labelbox" x="188" y="18" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="398" y="18" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="628" y="18" width="156" height="42" rx="2"/>
  <rect class="labelbox" x="878" y="18" width="156" height="42" rx="2"/>

  <text class="t" x="66" y="44" text-anchor="middle">User</text>
  <text class="t" x="251" y="44" text-anchor="middle">Giao diện</text>
  <text class="t" x="471" y="36" text-anchor="middle">Project Service</text><text class="ts" x="471" y="50" text-anchor="middle">(crisis config API)</text>
  <text class="t" x="706" y="36" text-anchor="middle">Crisis Config UseCase</text><text class="ts" x="706" y="50" text-anchor="middle">(validation + upsert)</text>
  <text class="t" x="956" y="36" text-anchor="middle">PostgreSQL</text><text class="ts" x="956" y="50" text-anchor="middle">(projects_crisis_config)</text>

  <rect class="labelbox" x="18" y="760" width="96" height="42" rx="2"/>
  <rect class="labelbox" x="188" y="760" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="398" y="760" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="628" y="760" width="156" height="42" rx="2"/>
  <rect class="labelbox" x="878" y="760" width="156" height="42" rx="2"/>

  <text class="t" x="66" y="786" text-anchor="middle">User</text>
  <text class="t" x="251" y="786" text-anchor="middle">Giao diện</text>
  <text class="t" x="471" y="778" text-anchor="middle">Project Service</text><text class="ts" x="471" y="792" text-anchor="middle">(crisis config API)</text>
  <text class="t" x="706" y="778" text-anchor="middle">Crisis Config UseCase</text><text class="ts" x="706" y="792" text-anchor="middle">(validation + upsert)</text>
  <text class="t" x="956" y="778" text-anchor="middle">PostgreSQL</text><text class="ts" x="956" y="792" text-anchor="middle">(projects_crisis_config)</text>

  <line class="lifeline" x1="66" y1="60" x2="66" y2="760"/>
  <line class="lifeline" x1="251" y1="60" x2="251" y2="760"/>
  <line class="lifeline" x1="471" y1="60" x2="471" y2="760"/>
  <line class="lifeline" x1="706" y1="60" x2="706" y2="760"/>
  <line class="lifeline" x1="956" y1="60" x2="956" y2="760"/>

  <circle class="step" cx="66" cy="98" r="8"/><text class="steptext" x="66" y="102" text-anchor="middle">1</text>
  <line class="msg" x1="74" y1="98" x2="243" y2="98" marker-end="url(#arrow)"/>
  <text class="t" x="159" y="92" text-anchor="middle">Mở cấu hình cảnh báo</text>

  <circle class="step" cx="251" cy="150" r="8"/><text class="steptext" x="251" y="154" text-anchor="middle">2</text>
  <line class="msg" x1="259" y1="150" x2="463" y2="150" marker-end="url(#arrow)"/>
  <text class="ts" x="361" y="138" text-anchor="middle">GET crisis-config(project_id)</text>

  <circle class="step" cx="471" cy="198" r="8"/><text class="steptext" x="471" y="202" text-anchor="middle">3</text>
  <line class="msg" x1="479" y1="198" x2="948" y2="198" marker-end="url(#arrow)"/>
  <text class="ts" x="713" y="186" text-anchor="middle">Load existing config if present</text>

  <circle class="step" cx="956" cy="224" r="8"/><text class="steptext" x="956" y="228" text-anchor="middle">4</text>
  <line class="ret" x1="948" y1="224" x2="479" y2="224" marker-end="url(#arrowDash)"/>
  <text class="ts" x="713" y="218" text-anchor="middle">current config or not found</text>

  <circle class="step" cx="471" cy="270" r="8"/><text class="steptext" x="471" y="274" text-anchor="middle">5</text>
  <line class="ret" x1="463" y1="270" x2="259" y2="270" marker-end="url(#arrowDash)"/>
  <text class="ts" x="361" y="258" text-anchor="middle">Nạp trạng thái hiện có lên giao diện</text>

  <circle class="step" cx="66" cy="336" r="8"/><text class="steptext" x="66" y="340" text-anchor="middle">6</text>
  <line class="msg" x1="74" y1="336" x2="243" y2="336" marker-end="url(#arrow)"/>
  <text class="t" x="159" y="330" text-anchor="middle">Chỉnh các nhóm quy tắc</text>

  <circle class="step" cx="251" cy="392" r="8"/><text class="steptext" x="251" y="396" text-anchor="middle">7</text>
  <line class="msg" x1="259" y1="392" x2="463" y2="392" marker-end="url(#arrow)"/>
  <text class="ts" x="361" y="380" text-anchor="middle">PUT crisis-config(project_id, rules)</text>

  <circle class="step" cx="471" cy="440" r="8"/><text class="steptext" x="471" y="444" text-anchor="middle">8</text>
  <line class="msg" x1="479" y1="440" x2="698" y2="440" marker-end="url(#arrow)"/>
  <text class="ts" x="588" y="428" text-anchor="middle">Validate project context and trigger rules</text>

  <rect class="alt" x="656" y="466" width="250" height="78"/>
  <rect x="656" y="466" width="28" height="16" fill="#ece9ff" stroke="#d4ccff" stroke-width="1"/>
  <text class="tc" x="670" y="478" text-anchor="middle">alt</text>
  <text class="tc" x="748" y="480">[Dữ liệu hợp lệ]</text>

  <circle class="step" cx="706" cy="506" r="8"/><text class="steptext" x="706" y="510" text-anchor="middle">9</text>
  <line class="msg" x1="714" y1="506" x2="948" y2="506" marker-end="url(#arrow)"/>
  <text class="ts" x="831" y="494" text-anchor="middle">Upsert projects_crisis_config</text>

  <circle class="step" cx="956" cy="532" r="8"/><text class="steptext" x="956" y="536" text-anchor="middle">10</text>
  <line class="ret" x1="948" y1="532" x2="714" y2="532" marker-end="url(#arrowDash)"/>
  <text class="ts" x="831" y="526" text-anchor="middle">persisted config</text>

  <circle class="step" cx="471" cy="586" r="8"/><text class="steptext" x="471" y="590" text-anchor="middle">11</text>
  <line class="ret" x1="463" y1="586" x2="259" y2="586" marker-end="url(#arrowDash)"/>
  <text class="ts" x="361" y="574" text-anchor="middle">Trả cấu hình đã lưu</text>

  <circle class="step" cx="251" cy="644" r="8"/><text class="steptext" x="251" y="648" text-anchor="middle">12</text>
  <line class="ret" x1="243" y1="644" x2="74" y2="644" marker-end="url(#arrowDash)"/>
  <text class="ts" x="159" y="632" text-anchor="middle">User xác nhận bộ quy tắc</text>

  <rect class="note" x="44" y="694" width="1230" height="50"/>
  <text class="t" x="659" y="716" text-anchor="middle">Flow này chỉ quản lý dữ liệu cấu hình cảnh báo theo project.</text>
  <text class="t" x="659" y="732" text-anchor="middle">Việc hệ thống dùng các quy tắc đó để phát hiện hoặc cảnh báo trong runtime thuộc các luồng vận hành khác.</text>
</svg>
