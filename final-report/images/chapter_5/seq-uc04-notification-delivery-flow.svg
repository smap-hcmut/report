<svg xmlns="http://www.w3.org/2000/svg" width="1340" height="820" viewBox="0 0 1340 820">
  <defs>
    <style>
      .labelbox { fill: #ece9ff; stroke: #cfc8ff; stroke-width: 1; }
      .lifeline { stroke: #d4ccff; stroke-width: 2; }
      .msg { stroke: #333333; stroke-width: 1.6; fill: none; }
      .ret { stroke: #555555; stroke-width: 1.3; stroke-dasharray: 5 4; fill: none; }
      .alt { fill: none; stroke: #d4ccff; stroke-width: 1.2; stroke-dasharray: 3 3; }
      .note { fill: #fff4b8; stroke: #e1d27a; stroke-width: 1.2; }
      .t { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #222222; }
      .ts { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #222222; }
      .tc { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #222222; }
      .step { fill: #333333; }
      .steptext { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #ffffff; font-weight: bold; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333" />
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555555" />
    </marker>
  </defs>
  <rect x="0" y="0" width="1340" height="820" fill="#ffffff"/>

  <rect class="labelbox" x="18" y="18" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="198" y="18" width="156" height="42" rx="2"/>
  <rect class="labelbox" x="418" y="18" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="638" y="18" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="868" y="18" width="136" height="42" rx="2"/>
  <rect class="labelbox" x="1078" y="18" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="1238" y="18" width="86" height="42" rx="2"/>

  <text class="t" x="81" y="36" text-anchor="middle">Backend Publisher</text><text class="ts" x="81" y="50" text-anchor="middle">(runtime event)</text>
  <text class="t" x="276" y="36" text-anchor="middle">Notification Service</text><text class="ts" x="276" y="50" text-anchor="middle">(Redis subscriber)</text>
  <text class="t" x="491" y="36" text-anchor="middle">Notification Service</text><text class="ts" x="491" y="50" text-anchor="middle">(message router)</text>
  <text class="t" x="701" y="36" text-anchor="middle">Hub</text><text class="ts" x="701" y="50" text-anchor="middle">(active connections)</text>
  <text class="t" x="936" y="36" text-anchor="middle">Alert Lane</text><text class="ts" x="936" y="50" text-anchor="middle">(optional side alert)</text>
  <text class="t" x="1141" y="36" text-anchor="middle">Giao diện</text>
  <text class="t" x="1281" y="44" text-anchor="middle">User</text>

  <rect class="labelbox" x="18" y="760" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="198" y="760" width="156" height="42" rx="2"/>
  <rect class="labelbox" x="418" y="760" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="638" y="760" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="868" y="760" width="136" height="42" rx="2"/>
  <rect class="labelbox" x="1078" y="760" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="1238" y="760" width="86" height="42" rx="2"/>

  <text class="t" x="81" y="778" text-anchor="middle">Backend Publisher</text><text class="ts" x="81" y="792" text-anchor="middle">(runtime event)</text>
  <text class="t" x="276" y="778" text-anchor="middle">Notification Service</text><text class="ts" x="276" y="792" text-anchor="middle">(Redis subscriber)</text>
  <text class="t" x="491" y="778" text-anchor="middle">Notification Service</text><text class="ts" x="491" y="792" text-anchor="middle">(message router)</text>
  <text class="t" x="701" y="778" text-anchor="middle">Hub</text><text class="ts" x="701" y="792" text-anchor="middle">(active connections)</text>
  <text class="t" x="936" y="778" text-anchor="middle">Alert Lane</text><text class="ts" x="936" y="792" text-anchor="middle">(optional side alert)</text>
  <text class="t" x="1141" y="786" text-anchor="middle">Giao diện</text>
  <text class="t" x="1281" y="786" text-anchor="middle">User</text>

  <line class="lifeline" x1="81" y1="60" x2="81" y2="760"/>
  <line class="lifeline" x1="276" y1="60" x2="276" y2="760"/>
  <line class="lifeline" x1="491" y1="60" x2="491" y2="760"/>
  <line class="lifeline" x1="701" y1="60" x2="701" y2="760"/>
  <line class="lifeline" x1="936" y1="60" x2="936" y2="760"/>
  <line class="lifeline" x1="1141" y1="60" x2="1141" y2="760"/>
  <line class="lifeline" x1="1281" y1="60" x2="1281" y2="760"/>

  <circle class="step" cx="81" cy="98" r="8"/><text class="steptext" x="81" y="102" text-anchor="middle">1</text>
  <line class="msg" x1="89" y1="98" x2="268" y2="98" marker-end="url(#arrow)"/>
  <text class="t" x="179" y="92" text-anchor="middle">Publish notification event</text>

  <circle class="step" cx="276" cy="150" r="8"/><text class="steptext" x="276" y="154" text-anchor="middle">2</text>
  <line class="msg" x1="284" y1="150" x2="483" y2="150" marker-end="url(#arrow)"/>
  <text class="ts" x="384" y="138" text-anchor="middle">Parse channel + detect message type</text>

  <circle class="step" cx="491" cy="198" r="8"/><text class="steptext" x="491" y="202" text-anchor="middle">3</text>
  <line class="msg" x1="499" y1="198" x2="693" y2="198" marker-end="url(#arrow)"/>
  <text class="ts" x="596" y="186" text-anchor="middle">Route to user scope or broadcast scope</text>

  <rect class="alt" x="454" y="224" width="580" height="120"/>
  <rect x="454" y="224" width="28" height="16" fill="#ece9ff" stroke="#d4ccff" stroke-width="1"/>
  <text class="tc" x="468" y="236" text-anchor="middle">alt</text>
  <text class="tc" x="564" y="238">[Alert side-channel cần được kích hoạt]</text>

  <circle class="step" cx="491" cy="270" r="8"/><text class="steptext" x="491" y="274" text-anchor="middle">4</text>
  <line class="msg" x1="499" y1="270" x2="928" y2="270" marker-end="url(#arrow)"/>
  <text class="ts" x="713" y="258" text-anchor="middle">Dispatch alert payload</text>

  <circle class="step" cx="936" cy="296" r="8"/><text class="steptext" x="936" y="300" text-anchor="middle">5</text>
  <line class="ret" x1="928" y1="296" x2="499" y2="296" marker-end="url(#arrowDash)"/>
  <text class="ts" x="713" y="290" text-anchor="middle">side alert handled or ignored</text>

  <circle class="step" cx="701" cy="382" r="8"/><text class="steptext" x="701" y="386" text-anchor="middle">6</text>
  <line class="msg" x1="709" y1="382" x2="1133" y2="382" marker-end="url(#arrow)"/>
  <text class="ts" x="921" y="370" text-anchor="middle">Push notification nếu có active compatible connection</text>

  <circle class="step" cx="1141" cy="408" r="8"/><text class="steptext" x="1141" y="412" text-anchor="middle">7</text>
  <line class="ret" x1="1133" y1="408" x2="709" y2="408" marker-end="url(#arrowDash)"/>
  <text class="ts" x="921" y="402" text-anchor="middle">delivery attempted</text>

  <circle class="step" cx="1141" cy="484" r="8"/><text class="steptext" x="1141" y="488" text-anchor="middle">8</text>
  <line class="ret" x1="1133" y1="484" x2="1281" y2="484" marker-end="url(#arrowDash)"/>
  <text class="ts" x="1207" y="472" text-anchor="middle">Hiển thị thông báo / cảnh báo</text>

  <circle class="step" cx="1281" cy="540" r="8"/><text class="steptext" x="1281" y="544" text-anchor="middle">9</text>
  <line class="ret" x1="1273" y1="540" x2="1149" y2="540" marker-end="url(#arrowDash)"/>
  <text class="ts" x="1211" y="528" text-anchor="middle">User mở chi tiết hoặc điều hướng</text>

  <rect class="note" x="44" y="660" width="1250" height="50"/>
  <text class="t" x="669" y="682" text-anchor="middle">Flow này mô tả delivery capability khi có active compatible connection và có sự kiện cần thông báo.</text>
  <text class="t" x="669" y="698" text-anchor="middle">Nó không khẳng định mọi loại giao diện đều luôn sử dụng cùng một cơ chế realtime tại mọi thời điểm.</text>
</svg>
