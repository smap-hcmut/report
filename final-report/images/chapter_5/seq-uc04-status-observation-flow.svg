<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <style>
      .labelbox { fill: #ece9ff; stroke: #cfc8ff; stroke-width: 1; }
      .lifeline { stroke: #d4ccff; stroke-width: 2; }
      .msg { stroke: #333333; stroke-width: 1.6; fill: none; }
      .ret { stroke: #555555; stroke-width: 1.3; stroke-dasharray: 5 4; fill: none; }
      .note { fill: #fff4b8; stroke: #e1d27a; stroke-width: 1.2; }
      .t { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #222222; }
      .ts { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #222222; }
      .step { fill: #333333; }
      .steptext { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #ffffff; font-weight: bold; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333" />
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555555" />
    </marker>
  </defs>
  <rect x="0" y="0" width="1280" height="760" fill="#ffffff"/>

  <rect class="labelbox" x="18" y="18" width="96" height="42" rx="2"/>
  <rect class="labelbox" x="188" y="18" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="408" y="18" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="638" y="18" width="136" height="42" rx="2"/>
  <rect class="labelbox" x="878" y="18" width="156" height="42" rx="2"/>

  <text class="t" x="66" y="44" text-anchor="middle">User</text>
  <text class="t" x="251" y="44" text-anchor="middle">Giao diện</text>
  <text class="t" x="481" y="36" text-anchor="middle">Project Service</text><text class="ts" x="481" y="50" text-anchor="middle">(campaign/project status)</text>
  <text class="t" x="706" y="36" text-anchor="middle">Ingest Service</text><text class="ts" x="706" y="50" text-anchor="middle">(datasource status)</text>
  <text class="t" x="956" y="36" text-anchor="middle">PostgreSQL</text><text class="ts" x="956" y="50" text-anchor="middle">(state metadata)</text>

  <rect class="labelbox" x="18" y="700" width="96" height="42" rx="2"/>
  <rect class="labelbox" x="188" y="700" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="408" y="700" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="638" y="700" width="136" height="42" rx="2"/>
  <rect class="labelbox" x="878" y="700" width="156" height="42" rx="2"/>

  <text class="t" x="66" y="726" text-anchor="middle">User</text>
  <text class="t" x="251" y="726" text-anchor="middle">Giao diện</text>
  <text class="t" x="481" y="718" text-anchor="middle">Project Service</text><text class="ts" x="481" y="732" text-anchor="middle">(campaign/project status)</text>
  <text class="t" x="706" y="718" text-anchor="middle">Ingest Service</text><text class="ts" x="706" y="732" text-anchor="middle">(datasource status)</text>
  <text class="t" x="956" y="718" text-anchor="middle">PostgreSQL</text><text class="ts" x="956" y="732" text-anchor="middle">(state metadata)</text>

  <line class="lifeline" x1="66" y1="60" x2="66" y2="700"/>
  <line class="lifeline" x1="251" y1="60" x2="251" y2="700"/>
  <line class="lifeline" x1="481" y1="60" x2="481" y2="700"/>
  <line class="lifeline" x1="706" y1="60" x2="706" y2="700"/>
  <line class="lifeline" x1="956" y1="60" x2="956" y2="700"/>

  <circle class="step" cx="66" cy="98" r="8"/><text class="steptext" x="66" y="102" text-anchor="middle">1</text>
  <line class="msg" x1="74" y1="98" x2="243" y2="98" marker-end="url(#arrow)"/>
  <text class="t" x="159" y="92" text-anchor="middle">Mở khu vực theo dõi</text>

  <circle class="step" cx="251" cy="150" r="8"/><text class="steptext" x="251" y="154" text-anchor="middle">2</text>
  <line class="msg" x1="259" y1="150" x2="473" y2="150" marker-end="url(#arrow)"/>
  <text class="ts" x="366" y="138" text-anchor="middle">Yêu cầu trạng thái campaign / project</text>

  <circle class="step" cx="481" cy="196" r="8"/><text class="steptext" x="481" y="200" text-anchor="middle">3</text>
  <line class="msg" x1="489" y1="196" x2="948" y2="196" marker-end="url(#arrow)"/>
  <text class="ts" x="718" y="184" text-anchor="middle">Truy vấn trạng thái hiện tại và metadata liên quan</text>

  <circle class="step" cx="481" cy="256" r="8"/><text class="steptext" x="481" y="260" text-anchor="middle">4</text>
  <line class="msg" x1="489" y1="256" x2="698" y2="256" marker-end="url(#arrow)"/>
  <text class="ts" x="593" y="244" text-anchor="middle">Yêu cầu trạng thái datasource / dry run nếu cần</text>

  <circle class="step" cx="706" cy="304" r="8"/><text class="steptext" x="706" y="308" text-anchor="middle">5</text>
  <line class="msg" x1="714" y1="304" x2="948" y2="304" marker-end="url(#arrow)"/>
  <text class="ts" x="831" y="292" text-anchor="middle">Truy vấn ingest state metadata</text>

  <circle class="step" cx="706" cy="352" r="8"/><text class="steptext" x="706" y="356" text-anchor="middle">6</text>
  <line class="ret" x1="698" y1="352" x2="489" y2="352" marker-end="url(#arrowDash)"/>
  <text class="ts" x="593" y="346" text-anchor="middle">datasource status</text>

  <circle class="step" cx="481" cy="410" r="8"/><text class="steptext" x="481" y="414" text-anchor="middle">7</text>
  <line class="ret" x1="473" y1="410" x2="259" y2="410" marker-end="url(#arrowDash)"/>
  <text class="ts" x="366" y="398" text-anchor="middle">campaign/project status + scope data</text>

  <circle class="step" cx="251" cy="470" r="8"/><text class="steptext" x="251" y="474" text-anchor="middle">8</text>
  <line class="ret" x1="243" y1="470" x2="74" y2="470" marker-end="url(#arrowDash)"/>
  <text class="ts" x="159" y="458" text-anchor="middle">Hiển thị trạng thái hiện tại</text>

  <rect class="note" x="44" y="610" width="1160" height="48"/>
  <text class="t" x="624" y="632" text-anchor="middle">Flow này phục vụ nhu cầu quan sát trạng thái hiện tại của user.</text>
  <text class="t" x="624" y="648" text-anchor="middle">Không có sự kiện mới vẫn có thể hiển thị trạng thái và thời điểm cập nhật gần nhất.</text>
</svg>
