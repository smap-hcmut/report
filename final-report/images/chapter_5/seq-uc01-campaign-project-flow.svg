<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .labelbox { fill: #ece9ff; stroke: #cfc8ff; stroke-width: 1; }
      .lifeline { stroke: #d4ccff; stroke-width: 2; }
      .msg { stroke: #333333; stroke-width: 1.6; fill: none; }
      .ret { stroke: #555555; stroke-width: 1.3; stroke-dasharray: 5 4; fill: none; }
      .alt { fill: none; stroke: #d4ccff; stroke-width: 1.2; stroke-dasharray: 3 3; }
      .note { fill: #fff4b8; stroke: #e1d27a; stroke-width: 1.2; }
      .t { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #222222; }
      .ts { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #222222; }
      .tc { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #222222; }
      .step { fill: #333333; }
      .steptext { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #ffffff; font-weight: bold; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333" />
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555555" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#ffffff"/>

  <!-- top labels -->
  <rect class="labelbox" x="18" y="18" width="96" height="42" rx="2"/>
  <rect class="labelbox" x="228" y="18" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="458" y="18" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="694" y="18" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="934" y="18" width="148" height="42" rx="2"/>

  <text class="t" x="66" y="44" text-anchor="middle">User</text>
  <text class="t" x="291" y="44" text-anchor="middle">Giao diện</text>
  <text class="t" x="531" y="36" text-anchor="middle">Project Service</text>
  <text class="ts" x="531" y="50" text-anchor="middle">(business control)</text>
  <text class="t" x="767" y="36" text-anchor="middle">Project Repository</text>
  <text class="ts" x="767" y="50" text-anchor="middle">(PostgreSQL layer)</text>
  <text class="t" x="1008" y="36" text-anchor="middle">PostgreSQL</text>
  <text class="ts" x="1008" y="50" text-anchor="middle">(campaigns, projects)</text>

  <!-- bottom labels -->
  <rect class="labelbox" x="18" y="700" width="96" height="42" rx="2"/>
  <rect class="labelbox" x="228" y="700" width="126" height="42" rx="2"/>
  <rect class="labelbox" x="458" y="700" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="694" y="700" width="146" height="42" rx="2"/>
  <rect class="labelbox" x="934" y="700" width="148" height="42" rx="2"/>

  <text class="t" x="66" y="726" text-anchor="middle">User</text>
  <text class="t" x="291" y="726" text-anchor="middle">Giao diện</text>
  <text class="t" x="531" y="718" text-anchor="middle">Project Service</text>
  <text class="ts" x="531" y="732" text-anchor="middle">(business control)</text>
  <text class="t" x="767" y="718" text-anchor="middle">Project Repository</text>
  <text class="ts" x="767" y="732" text-anchor="middle">(PostgreSQL layer)</text>
  <text class="t" x="1008" y="718" text-anchor="middle">PostgreSQL</text>
  <text class="ts" x="1008" y="732" text-anchor="middle">(campaigns, projects)</text>

  <!-- lifelines -->
  <line class="lifeline" x1="66" y1="60" x2="66" y2="700"/>
  <line class="lifeline" x1="291" y1="60" x2="291" y2="700"/>
  <line class="lifeline" x1="531" y1="60" x2="531" y2="700"/>
  <line class="lifeline" x1="767" y1="60" x2="767" y2="700"/>
  <line class="lifeline" x1="1008" y1="60" x2="1008" y2="700"/>

  <!-- messages -->
  <circle class="step" cx="66" cy="94" r="8"/><text class="steptext" x="66" y="98" text-anchor="middle">1</text>
  <line class="msg" x1="74" y1="94" x2="283" y2="94" marker-end="url(#arrow)"/>
  <text class="t" x="180" y="88" text-anchor="middle">Bắt đầu thiết lập campaign / project</text>

  <circle class="step" cx="291" cy="148" r="8"/><text class="steptext" x="291" y="152" text-anchor="middle">2</text>
  <line class="msg" x1="299" y1="148" x2="523" y2="148" marker-end="url(#arrow)"/>
  <text class="ts" x="411" y="136" text-anchor="middle">Tạo campaign mới hoặc chọn campaign đã có</text>
  <text class="ts" x="411" y="150" text-anchor="middle">kèm ngữ cảnh theo dõi</text>

  <rect class="alt" x="500" y="170" width="560" height="96"/>
  <rect x="500" y="170" width="28" height="16" fill="#ece9ff" stroke="#d4ccff" stroke-width="1"/>
  <text class="tc" x="514" y="182" text-anchor="middle">alt</text>
  <text class="tc" x="610" y="184">[Tạo campaign mới]</text>

  <circle class="step" cx="531" cy="204" r="8"/><text class="steptext" x="531" y="208" text-anchor="middle">3</text>
  <line class="msg" x1="539" y1="204" x2="759" y2="204" marker-end="url(#arrow)"/>
  <text class="ts" x="649" y="192" text-anchor="middle">Yêu cầu tạo campaign</text>

  <circle class="step" cx="767" cy="236" r="8"/><text class="steptext" x="767" y="240" text-anchor="middle">4</text>
  <line class="msg" x1="775" y1="236" x2="1000" y2="236" marker-end="url(#arrow)"/>
  <text class="ts" x="888" y="224" text-anchor="middle">INSERT campaign metadata</text>

  <circle class="step" cx="1008" cy="258" r="8"/><text class="steptext" x="1008" y="262" text-anchor="middle">5</text>
  <line class="ret" x1="1000" y1="258" x2="775" y2="258" marker-end="url(#arrowDash)"/>
  <text class="ts" x="888" y="252" text-anchor="middle">campaign_id</text>

  <circle class="step" cx="291" cy="312" r="8"/><text class="steptext" x="291" y="316" text-anchor="middle">6</text>
  <line class="msg" x1="299" y1="312" x2="523" y2="312" marker-end="url(#arrow)"/>
  <text class="ts" x="411" y="300" text-anchor="middle">Tạo project trong campaign đã chọn</text>
  <text class="ts" x="411" y="314" text-anchor="middle">{name, entity, domain, description}</text>

  <circle class="step" cx="531" cy="360" r="8"/><text class="steptext" x="531" y="364" text-anchor="middle">7</text>
  <line class="msg" x1="539" y1="360" x2="759" y2="360" marker-end="url(#arrow)"/>
  <text class="ts" x="649" y="348" text-anchor="middle">Validate context và create project</text>

  <circle class="step" cx="767" cy="404" r="8"/><text class="steptext" x="767" y="408" text-anchor="middle">8</text>
  <line class="msg" x1="775" y1="404" x2="1000" y2="404" marker-end="url(#arrow)"/>
  <text class="ts" x="888" y="392" text-anchor="middle">INSERT project row</text>
  <text class="ts" x="888" y="406" text-anchor="middle">status=PENDING, config_status=DRAFT</text>

  <circle class="step" cx="1008" cy="428" r="8"/><text class="steptext" x="1008" y="432" text-anchor="middle">9</text>
  <line class="ret" x1="1000" y1="428" x2="775" y2="428" marker-end="url(#arrowDash)"/>
  <text class="ts" x="888" y="422" text-anchor="middle">project_id + persisted metadata</text>

  <circle class="step" cx="531" cy="470" r="8"/><text class="steptext" x="531" y="474" text-anchor="middle">10</text>
  <line class="ret" x1="523" y1="470" x2="299" y2="470" marker-end="url(#arrowDash)"/>
  <text class="ts" x="411" y="458" text-anchor="middle">campaign_id, project_id, initial config state</text>

  <circle class="step" cx="291" cy="518" r="8"/><text class="steptext" x="291" y="522" text-anchor="middle">11</text>
  <line class="ret" x1="283" y1="518" x2="74" y2="518" marker-end="url(#arrowDash)"/>
  <text class="ts" x="180" y="506" text-anchor="middle">Chiến dịch được tạo để tiếp tục cấu hình</text>

  <rect class="note" x="44" y="620" width="1040" height="48"/>
  <text class="t" x="564" y="642" text-anchor="middle">Campaign và project chỉ được lưu như business context ban đầu.</text>
  <text class="t" x="564" y="658" text-anchor="middle">Chưa có kích hoạt runtime thu thập hay xử lý nền ở flow này.</text>
</svg>
