<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #475569; }
      .actor-label { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #0f172a; }
      .actor-note { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #475569; }
      .usecase { fill: #ffffff; stroke: #0284c7; stroke-width: 2.4; }
      .usecase-accent { fill: #f0f9ff; stroke: #0284c7; stroke-width: 2.4; }
      .usecase-text { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; fill: #0f172a; }
      .system-box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2.2; }
      .line { stroke: #475569; stroke-width: 2; fill: none; }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 8 6; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="48" y="58" class="title">Overall Use Case Diagram of SMAP</text>
  <text x="48" y="88" class="subtitle">Five actor-goal use cases aligned with Chapter 4.4.</text>

  <rect x="300" y="130" width="1080" height="830" rx="24" class="system-box"/>
  <text x="340" y="170" class="actor-label">SMAP Platform</text>

  <g transform="translate(95,360)">
    <circle cx="55" cy="22" r="20" stroke="#0f172a" stroke-width="3" fill="none"/>
    <line x1="55" y1="42" x2="55" y2="108" class="line"/>
    <line x1="25" y1="66" x2="85" y2="66" class="line"/>
    <line x1="55" y1="108" x2="25" y2="160" class="line"/>
    <line x1="55" y1="108" x2="85" y2="160" class="line"/>
    <text x="55" y="194" text-anchor="middle" class="actor-label">A-01</text>
    <text x="55" y="216" text-anchor="middle" class="actor-note">Internal specialist user</text>
  </g>

  <g transform="translate(1420,360)">
    <circle cx="55" cy="22" r="20" stroke="#0f172a" stroke-width="3" fill="none"/>
    <line x1="55" y1="42" x2="55" y2="108" class="line"/>
    <line x1="25" y1="66" x2="85" y2="66" class="line"/>
    <line x1="55" y1="108" x2="25" y2="160" class="line"/>
    <line x1="55" y1="108" x2="85" y2="160" class="line"/>
    <text x="55" y="194" text-anchor="middle" class="actor-label">A-02</text>
    <text x="55" y="216" text-anchor="middle" class="actor-note">Social platform</text>
  </g>

  <ellipse cx="610" cy="260" rx="210" ry="54" class="usecase-accent"/>
  <text x="610" y="250" text-anchor="middle" class="usecase-text">
    <tspan x="610" dy="0">UC-01</tspan>
    <tspan x="610" dy="20">Thiet lap chien dich theo doi</tspan>
  </text>

  <ellipse cx="1050" cy="260" rx="210" ry="54" class="usecase"/>
  <text x="1050" y="250" text-anchor="middle" class="usecase-text">
    <tspan x="1050" dy="0">UC-05</tspan>
    <tspan x="1050" dy="20">Quan ly quy tac canh bao</tspan>
  </text>

  <ellipse cx="610" cy="500" rx="210" ry="54" class="usecase"/>
  <text x="610" y="490" text-anchor="middle" class="usecase-text">
    <tspan x="610" dy="0">UC-02</tspan>
    <tspan x="610" dy="20">Van hanh chien dich theo doi</tspan>
  </text>

  <ellipse cx="1050" cy="500" rx="210" ry="54" class="usecase"/>
  <text x="1050" y="490" text-anchor="middle" class="usecase-text">
    <tspan x="1050" dy="0">UC-04</tspan>
    <tspan x="1050" dy="20">Theo doi trang thai va canh bao</tspan>
  </text>

  <ellipse cx="830" cy="760" rx="230" ry="58" class="usecase"/>
  <text x="830" y="750" text-anchor="middle" class="usecase-text">
    <tspan x="830" dy="0">UC-03</tspan>
    <tspan x="830" dy="20">Tra cuu va hoi dap du lieu phan tich</tspan>
  </text>

  <line x1="205" y1="450" x2="415" y2="270" class="line"/>
  <line x1="205" y1="470" x2="410" y2="500" class="line"/>
  <line x1="205" y1="490" x2="600" y2="745" class="line"/>
  <line x1="205" y1="510" x2="850" y2="500" class="line"/>
  <line x1="205" y1="530" x2="850" y2="260" class="line"/>

  <line x1="1380" y1="260" x2="1260" y2="260" class="dash"/>
  <line x1="1420" y1="440" x2="820" y2="500" class="dash"/>

  <text x="820" y="910" text-anchor="middle" class="actor-note">Authentication and internal processing are supporting concerns, not separate business use cases in Chapter 4.4.</text>
</svg>
