<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="940" viewBox="0 0 1680 940">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #475569; }
      .head { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #0f172a; }
      .body { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #1e293b; }
      .life { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; }
      .msg { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="48" y="58" class="title">Figure 4.7. Sequence Diagram of Knowledge Search and Chat</text>
  <text x="48" y="88" class="subtitle">Authenticated knowledge retrieval combining semantic search, conversation state, and LLM response generation.</text>

  <rect x="70" y="130" width="140" height="46" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="380" y="130" width="190" height="46" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="760" y="130" width="160" height="46" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <rect x="1100" y="130" width="170" height="46" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <rect x="1440" y="130" width="140" height="46" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="140" y="159" text-anchor="middle" class="head">User</text>
  <text x="475" y="159" text-anchor="middle" class="head">knowledge-srv</text>
  <text x="840" y="159" text-anchor="middle" class="head">Qdrant</text>
  <text x="1185" y="159" text-anchor="middle" class="head">Redis / PostgreSQL</text>
  <text x="1510" y="159" text-anchor="middle" class="head">LLM</text>

  <line x1="140" y1="176" x2="140" y2="860" class="life"/>
  <line x1="475" y1="176" x2="475" y2="860" class="life"/>
  <line x1="840" y1="176" x2="840" y2="860" class="life"/>
  <line x1="1185" y1="176" x2="1185" y2="860" class="life"/>
  <line x1="1510" y1="176" x2="1510" y2="860" class="life"/>

  <path d="M140 240 L475 240" class="msg"/>
  <rect x="210" y="212" width="195" height="22" rx="6" class="box"/>
  <text x="307" y="227" text-anchor="middle" class="body">POST /api/v1/knowledge/chat</text>

  <path d="M475 340 L840 340" class="msg"/>
  <rect x="580" y="312" width="155" height="22" rx="6" class="box"/>
  <text x="657" y="327" text-anchor="middle" class="body">semantic search with filters</text>

  <path d="M475 450 L1185 450" class="msg"/>
  <rect x="745" y="422" width="170" height="22" rx="6" class="box"/>
  <text x="830" y="437" text-anchor="middle" class="body">load conversation and cache state</text>

  <path d="M475 560 L1510 560" class="msg"/>
  <rect x="885" y="532" width="215" height="22" rx="6" class="box"/>
  <text x="992" y="547" text-anchor="middle" class="body">build prompt and generate answer</text>

  <path d="M475 670 L1185 670" class="msg"/>
  <rect x="790" y="642" width="135" height="22" rx="6" class="box"/>
  <text x="857" y="657" text-anchor="middle" class="body">store messages and metadata</text>

  <path d="M475 780 L140 780" class="msg"/>
  <rect x="232" y="752" width="150" height="22" rx="6" class="box"/>
  <text x="307" y="767" text-anchor="middle" class="body">chat response or async status</text>
</svg>
