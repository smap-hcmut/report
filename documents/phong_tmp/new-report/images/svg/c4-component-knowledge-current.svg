<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="980" viewBox="0 0 1700 980">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #475569; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
      .body { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #334155; }
      .meta { font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 700; fill: #475569; }
      .boundary { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2.5; stroke-dasharray: 10 8; }
      .node { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2.5; }
      .store { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2.5; }
      .ext { fill: #fef2f2; stroke: #dc2626; stroke-width: 2.5; }
      .edge { stroke: #64748b; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .tag { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.3; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="48" y="58" class="title">Figure 5.5. knowledge-srv Component View</text>
  <text x="48" y="88" class="subtitle">Level 3 view of indexing, retrieval, generation, and notebook synchronization inside the knowledge layer.</text>

  <rect x="50" y="130" width="1600" height="760" rx="22" class="boundary"/>
  <text x="80" y="164" class="label">knowledge-srv [Go + Gin + Kafka consumers + Qdrant client]</text>

  <rect x="120" y="250" width="300" height="140" rx="18" class="node"/>
  <text x="270" y="298" text-anchor="middle" class="label">Kafka Consumers</text>
  <text x="270" y="330" text-anchor="middle" class="body">consume layer 3, layer 2,</text>
  <text x="270" y="356" text-anchor="middle" class="body">and layer 1 analytics topics</text>

  <rect x="510" y="250" width="320" height="140" rx="18" class="node"/>
  <text x="670" y="298" text-anchor="middle" class="label">Indexer</text>
  <text x="670" y="330" text-anchor="middle" class="body">transforms documents and upserts</text>
  <text x="670" y="356" text-anchor="middle" class="body">vectors plus metadata into Qdrant</text>

  <rect x="920" y="220" width="420" height="180" rx="18" class="node"/>
  <text x="1130" y="272" text-anchor="middle" class="label">Search and RAG API</text>
  <text x="1130" y="304" text-anchor="middle" class="body">semantic search, citation-aware chat</text>
  <text x="1130" y="330" text-anchor="middle" class="body">query routing, prompt building, retrieval</text>
  <text x="1130" y="356" text-anchor="middle" class="body">and report-oriented answer assembly</text>
  <text x="1130" y="388" text-anchor="middle" class="meta">Gin + Gemini + Voyage integration</text>

  <rect x="400" y="520" width="260" height="130" rx="18" class="store"/>
  <text x="530" y="566" text-anchor="middle" class="label">Qdrant</text>
  <text x="530" y="596" text-anchor="middle" class="body">project collections and</text>
  <text x="530" y="622" text-anchor="middle" class="body">macro insight vectors</text>

  <rect x="760" y="520" width="300" height="130" rx="18" class="store"/>
  <text x="910" y="566" text-anchor="middle" class="label">PostgreSQL / Redis / MinIO</text>
  <text x="910" y="596" text-anchor="middle" class="body">metadata, cache, chat history,</text>
  <text x="910" y="622" text-anchor="middle" class="body">and report artifacts</text>

  <rect x="1140" y="520" width="220" height="130" rx="18" class="node"/>
  <text x="1250" y="566" text-anchor="middle" class="label">Notebook Sync</text>
  <text x="1250" y="596" text-anchor="middle" class="body">builds notebook materials and</text>
  <text x="1250" y="622" text-anchor="middle" class="body">submits asynchronous jobs</text>

  <rect x="1420" y="520" width="180" height="130" rx="18" class="ext"/>
  <text x="1510" y="566" text-anchor="middle" class="label">AI Services</text>
  <text x="1510" y="596" text-anchor="middle" class="body">Gemini, Voyage,</text>
  <text x="1510" y="622" text-anchor="middle" class="body">and Maestro</text>

  <path d="M420 320 L510 320" class="edge"/>
  <path d="M830 320 L920 320" class="edge"/>
  <path d="M670 390 L560 520" class="edge"/>
  <path d="M1030 400 L930 520" class="edge"/>
  <path d="M1180 400 L1250 520" class="edge"/>
  <path d="M1340 320 L1500 520" class="edge"/>

  <rect x="440" y="292" width="90" height="22" rx="6" class="tag"/>
  <text x="485" y="307" text-anchor="middle" class="body">consume</text>
  <rect x="850" y="292" width="90" height="22" rx="6" class="tag"/>
  <text x="895" y="307" text-anchor="middle" class="body">index</text>
  <rect x="590" y="450" width="110" height="22" rx="6" class="tag"/>
  <text x="645" y="465" text-anchor="middle" class="body">upsert vectors</text>
  <rect x="925" y="450" width="130" height="22" rx="6" class="tag"/>
  <text x="990" y="465" text-anchor="middle" class="body">metadata and cache</text>
  <rect x="1195" y="450" width="120" height="22" rx="6" class="tag"/>
  <text x="1255" y="465" text-anchor="middle" class="body">sync if enabled</text>
  <rect x="1395" y="448" width="120" height="22" rx="6" class="tag"/>
  <text x="1455" y="463" text-anchor="middle" class="body">LLM calls</text>
</svg>
