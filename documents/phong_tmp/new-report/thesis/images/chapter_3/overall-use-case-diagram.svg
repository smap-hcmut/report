<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #475569; }
      .actor-label { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #0f172a; }
      .usecase { fill: #ffffff; stroke: #0284c7; stroke-width: 2.4; }
      .usecase-text { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; fill: #0f172a; }
      .system-box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2.2; }
      .line { stroke: #475569; stroke-width: 2; fill: none; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="48" y="58" class="title">Figure 3.1. Overall Use Case Diagram of SMAP</text>
  <text x="48" y="88" class="subtitle">Primary user interactions confirmed from current routes, handlers, and service boundaries.</text>

  <rect x="280" y="130" width="1120" height="840" rx="24" class="system-box"/>
  <text x="320" y="170" class="actor-label">SMAP Platform</text>

  <g transform="translate(90,280)">
    <circle cx="55" cy="22" r="20" stroke="#0f172a" stroke-width="3" fill="none"/>
    <line x1="55" y1="42" x2="55" y2="108" class="line"/>
    <line x1="25" y1="66" x2="85" y2="66" class="line"/>
    <line x1="55" y1="108" x2="25" y2="160" class="line"/>
    <line x1="55" y1="108" x2="85" y2="160" class="line"/>
    <text x="55" y="194" text-anchor="middle" class="actor-label">End User</text>
  </g>

  <g transform="translate(90,690)">
    <circle cx="55" cy="22" r="20" stroke="#0f172a" stroke-width="3" fill="none"/>
    <line x1="55" y1="42" x2="55" y2="108" class="line"/>
    <line x1="25" y1="66" x2="85" y2="66" class="line"/>
    <line x1="55" y1="108" x2="25" y2="160" class="line"/>
    <line x1="55" y1="108" x2="85" y2="160" class="line"/>
    <text x="55" y="194" text-anchor="middle" class="actor-label">System Operator</text>
  </g>

  <ellipse cx="520" cy="250" rx="135" ry="42" class="usecase"/>
  <text x="520" y="256" text-anchor="middle" class="usecase-text">Authenticate User</text>

  <ellipse cx="880" cy="250" rx="165" ry="42" class="usecase"/>
  <text x="880" y="248" text-anchor="middle" class="usecase-text">
    <tspan x="880" dy="0">Create Campaign</tspan>
    <tspan x="880" dy="18">and Project</tspan>
  </text>

  <ellipse cx="1240" cy="250" rx="150" ry="42" class="usecase"/>
  <text x="1240" y="248" text-anchor="middle" class="usecase-text">
    <tspan x="1240" dy="0">Configure Crisis</tspan>
    <tspan x="1240" dy="18">Rules</tspan>
  </text>

  <ellipse cx="700" cy="450" rx="195" ry="44" class="usecase"/>
  <text x="700" y="448" text-anchor="middle" class="usecase-text">
    <tspan x="700" dy="0">Manage Datasources</tspan>
    <tspan x="700" dy="18">and Crawl Targets</tspan>
  </text>

  <ellipse cx="1120" cy="450" rx="150" ry="42" class="usecase"/>
  <text x="1120" y="456" text-anchor="middle" class="usecase-text">Run Dry Run</text>

  <ellipse cx="700" cy="660" rx="200" ry="44" class="usecase"/>
  <text x="700" y="658" text-anchor="middle" class="usecase-text">
    <tspan x="700" dy="0">Activate, Pause, Resume</tspan>
    <tspan x="700" dy="18">or Archive Project</tspan>
  </text>

  <ellipse cx="1120" cy="660" rx="185" ry="44" class="usecase"/>
  <text x="1120" y="658" text-anchor="middle" class="usecase-text">
    <tspan x="1120" dy="0">Run Analytics and</tspan>
    <tspan x="1120" dy="18">Build Knowledge</tspan>
  </text>

  <ellipse cx="700" cy="860" rx="150" ry="42" class="usecase"/>
  <text x="700" y="858" text-anchor="middle" class="usecase-text">
    <tspan x="700" dy="0">Search and</tspan>
    <tspan x="700" dy="18">Chat</tspan>
  </text>

  <ellipse cx="1120" cy="860" rx="165" ry="42" class="usecase"/>
  <text x="1120" y="858" text-anchor="middle" class="usecase-text">
    <tspan x="1120" dy="0">Receive Alerts and</tspan>
    <tspan x="1120" dy="18">Realtime Updates</tspan>
  </text>

  <line x1="200" y1="330" x2="392" y2="270" class="line"/>
  <line x1="200" y1="338" x2="720" y2="262" class="line"/>
  <line x1="200" y1="346" x2="1094" y2="262" class="line"/>
  <line x1="200" y1="356" x2="520" y2="430" class="line"/>
  <line x1="200" y1="364" x2="970" y2="430" class="line"/>
  <line x1="200" y1="372" x2="500" y2="646" class="line"/>
  <line x1="200" y1="380" x2="942" y2="646" class="line"/>
  <line x1="200" y1="388" x2="560" y2="844" class="line"/>
  <line x1="200" y1="396" x2="960" y2="844" class="line"/>

  <line x1="200" y1="770" x2="510" y2="680" class="line"/>
  <line x1="200" y1="778" x2="986" y2="680" class="line"/>
  <line x1="200" y1="786" x2="960" y2="860" class="line"/>
</svg>
