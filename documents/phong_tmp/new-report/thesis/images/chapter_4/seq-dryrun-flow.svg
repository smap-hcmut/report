<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #475569; }
      .head { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #0f172a; }
      .body { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #1e293b; }
      .life { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; }
      .msg { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="48" y="58" class="title">Figure 4.5. Sequence Diagram of the Datasource Dry Run Process</text>
  <text x="48" y="88" class="subtitle">Validation flow before activation, including sampling and persistence of dry-run results.</text>

  <rect x="80" y="130" width="140" height="46" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="390" y="130" width="170" height="46" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="810" y="130" width="160" height="46" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <rect x="1200" y="130" width="200" height="46" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="150" y="159" text-anchor="middle" class="head">User</text>
  <text x="475" y="159" text-anchor="middle" class="head">ingest-srv</text>
  <text x="890" y="159" text-anchor="middle" class="head">Crawler Adapter</text>
  <text x="1300" y="159" text-anchor="middle" class="head">schema_ingest</text>

  <line x1="150" y1="176" x2="150" y2="840" class="life"/>
  <line x1="475" y1="176" x2="475" y2="840" class="life"/>
  <line x1="890" y1="176" x2="890" y2="840" class="life"/>
  <line x1="1300" y1="176" x2="1300" y2="840" class="life"/>

  <path d="M150 240 L475 240" class="msg"/>
  <rect x="255" y="212" width="120" height="22" rx="6" class="box"/>
  <text x="315" y="227" text-anchor="middle" class="body">POST /datasources/:id/dryrun</text>

  <path d="M475 340 L1300 340" class="msg"/>
  <rect x="795" y="312" width="185" height="22" rx="6" class="box"/>
  <text x="887" y="327" text-anchor="middle" class="body">create dryrun_results row</text>

  <path d="M475 450 L890 450" class="msg"/>
  <rect x="605" y="422" width="155" height="22" rx="6" class="box"/>
  <text x="682" y="437" text-anchor="middle" class="body">request sample validation</text>

  <path d="M890 560 L475 560" class="msg"/>
  <rect x="610" y="532" width="145" height="22" rx="6" class="box"/>
  <text x="682" y="547" text-anchor="middle" class="body">sample, warnings, status</text>

  <path d="M475 670 L1300 670" class="msg"/>
  <rect x="785" y="642" width="205" height="22" rx="6" class="box"/>
  <text x="887" y="657" text-anchor="middle" class="body">persist latest result and history</text>

  <path d="M475 780 L150 780" class="msg"/>
  <rect x="270" y="752" width="90" height="22" rx="6" class="box"/>
  <text x="315" y="767" text-anchor="middle" class="body">dry-run output</text>
</svg>
