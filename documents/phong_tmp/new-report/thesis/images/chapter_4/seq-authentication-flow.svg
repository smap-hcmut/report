<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #475569; }
      .head { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #0f172a; }
      .body { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #1e293b; }
      .life { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; }
      .msg { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="48" y="58" class="title">Figure 4.3. Sequence Diagram of the Authentication Flow</text>
  <text x="48" y="88" class="subtitle">OAuth2 login, callback handling, session creation, and authenticated user retrieval.</text>

  <rect x="90" y="130" width="140" height="46" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="400" y="130" width="180" height="46" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="820" y="130" width="190" height="46" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <rect x="1200" y="130" width="150" height="46" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="160" y="159" text-anchor="middle" class="head">User</text>
  <text x="490" y="159" text-anchor="middle" class="head">identity-srv</text>
  <text x="915" y="159" text-anchor="middle" class="head">Google OAuth2</text>
  <text x="1275" y="159" text-anchor="middle" class="head">Redis</text>

  <line x1="160" y1="176" x2="160" y2="820" class="life"/>
  <line x1="490" y1="176" x2="490" y2="820" class="life"/>
  <line x1="915" y1="176" x2="915" y2="820" class="life"/>
  <line x1="1275" y1="176" x2="1275" y2="820" class="life"/>

  <path d="M160 240 L490 240" class="msg"/>
  <rect x="245" y="212" width="160" height="22" rx="6" class="box"/>
  <text x="325" y="227" text-anchor="middle" class="body">GET /authentication/login</text>

  <path d="M490 330 L915 330" class="msg"/>
  <rect x="612" y="302" width="180" height="22" rx="6" class="box"/>
  <text x="702" y="317" text-anchor="middle" class="body">redirect to provider</text>

  <path d="M915 420 L490 420" class="msg"/>
  <rect x="615" y="392" width="175" height="22" rx="6" class="box"/>
  <text x="702" y="407" text-anchor="middle" class="body">callback with auth code</text>

  <path d="M490 510 L1275 510" class="msg"/>
  <rect x="780" y="482" width="205" height="22" rx="6" class="box"/>
  <text x="882" y="497" text-anchor="middle" class="body">createSession(userID, jti)</text>

  <path d="M490 600 L160 600" class="msg"/>
  <rect x="245" y="572" width="160" height="22" rx="6" class="box"/>
  <text x="325" y="587" text-anchor="middle" class="body">set cookie / return token</text>

  <path d="M160 690 L490 690" class="msg"/>
  <rect x="255" y="662" width="140" height="22" rx="6" class="box"/>
  <text x="325" y="677" text-anchor="middle" class="body">GET /authentication/me</text>

  <path d="M490 780 L160 780" class="msg"/>
  <rect x="260" y="752" width="130" height="22" rx="6" class="box"/>
  <text x="325" y="767" text-anchor="middle" class="body">current user payload</text>
</svg>
