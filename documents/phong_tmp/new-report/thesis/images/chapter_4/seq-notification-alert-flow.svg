<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="940" viewBox="0 0 1680 940">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #475569; }
      .head { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #0f172a; }
      .body { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #1e293b; }
      .life { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; }
      .msg { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="48" y="58" class="title">Figure 4.8. Sequence Diagram of the Notification Alert Flow</text>
  <text x="48" y="88" class="subtitle">Progress and crisis notifications delivered from backend publishers through Redis to WebSocket and Discord channels.</text>

  <rect x="60" y="130" width="190" height="46" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="400" y="130" width="150" height="46" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <rect x="760" y="130" width="210" height="46" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="1140" y="130" width="190" height="46" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <rect x="1460" y="130" width="140" height="46" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="155" y="159" text-anchor="middle" class="head">Backend Publisher</text>
  <text x="475" y="159" text-anchor="middle" class="head">Redis</text>
  <text x="865" y="159" text-anchor="middle" class="head">notification-srv</text>
  <text x="1235" y="159" text-anchor="middle" class="head">WebSocket Client</text>
  <text x="1530" y="159" text-anchor="middle" class="head">Discord</text>

  <line x1="155" y1="176" x2="155" y2="860" class="life"/>
  <line x1="475" y1="176" x2="475" y2="860" class="life"/>
  <line x1="865" y1="176" x2="865" y2="860" class="life"/>
  <line x1="1235" y1="176" x2="1235" y2="860" class="life"/>
  <line x1="1530" y1="176" x2="1530" y2="860" class="life"/>

  <path d="M155 240 L475 240" class="msg"/>
  <rect x="250" y="212" width="130" height="22" rx="6" class="box"/>
  <text x="315" y="227" text-anchor="middle" class="body">publish scoped message</text>

  <path d="M475 350 L865 350" class="msg"/>
  <rect x="595" y="322" width="150" height="22" rx="6" class="box"/>
  <text x="670" y="337" text-anchor="middle" class="body">consume Pub/Sub event</text>

  <path d="M865 460 L1235 460" class="msg"/>
  <rect x="970" y="432" width="160" height="22" rx="6" class="box"/>
  <text x="1050" y="447" text-anchor="middle" class="body">push websocket frame</text>

  <path d="M865 580 L1530 580" class="msg"/>
  <rect x="1070" y="552" width="255" height="22" rx="6" class="box"/>
  <text x="1197" y="567" text-anchor="middle" class="body">dispatch formatted alert or campaign embed</text>

  <path d="M1235 700 L865 700" class="msg"/>
  <rect x="960" y="672" width="180" height="22" rx="6" class="box"/>
  <text x="1050" y="687" text-anchor="middle" class="body">connection lifecycle / acknowledgement</text>
</svg>
